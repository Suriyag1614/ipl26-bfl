<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/bfl/bfl-logo.png">
  <meta name="theme-color" content="#f0b429">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - BFL Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .role-tab { flex:1;padding:9px 0;background:transparent;border:none;border-radius:7px;font-family:var(--f-ui);font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all var(--t); }
    .role-tab.active { background:var(--accent);color:#000; }
    .login-theme-corner { position:fixed; top:max(12px, env(safe-area-inset-top)); right:max(12px, env(safe-area-inset-right)); z-index:300; }
    @media (max-width:480px) {
      .login-wrap { padding:16px max(12px, env(safe-area-inset-left)) 24px max(12px, env(safe-area-inset-right)); }
      .login-logo img { height:72px !important; }
      .login-logo-text { font-size:clamp(20px, 6vw, 30px) !important; }
      .role-tab { font-size:13px; padding:8px 4px; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="login-theme-corner">
  <button class="btn btn-ghost btn-sm theme-toggle" onclick="UI.toggleTheme()" style="padding:6px 8px;min-width:34px;" title="Toggle theme"></button>
</div>

<div class="login-wrap" style="position:relative;z-index:1;">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div class="login-logo"><img src="images/bfl/bfl-logo.png" alt="BFL Logo" style="height: 100px;"></div>
      <div class="login-logo-text">BISHOPIANS FANTASY LEAGUE</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;letter-spacing:3px;text-transform:uppercase;">IPL 2026</div>
    </div>

    <div style="display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;">
      <button class="role-tab active" id="tab-team"  onclick="setRole('team')">My Team</button>
      <button class="role-tab"        id="tab-admin" onclick="setRole('admin')">Admin</button>
    </div>

    <div class="form-group" id="team-row">
      <label class="form-label">Select Team</label>
      <select class="form-select" id="team-select"><option value="">— Loading teams… —</option></select>
    </div>

    <div class="form-group">
      <label class="form-label" id="pwd-label">Team Password</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pwd-toggle" type="button" onclick="togglePwd()">
          <svg id="eye-show" viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-hide" style="display:none;" viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div id="auth-error" style="color:var(--red);font-size:13px;min-height:18px;margin-bottom:12px;text-align:center;"></div>

    <button class="btn btn-accent btn-full" id="login-btn" onclick="doLogin()">SIGN IN</button>

    <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text3);">BFL Fantasy Cricket · Private System</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
'use strict';
var _role = 'team', _teams = [];

UI.initTheme();

function setRole(r) {
  _role = r;
  document.getElementById('tab-team').classList.toggle('active',  r==='team');
  document.getElementById('tab-admin').classList.toggle('active', r==='admin');
  document.getElementById('team-row').style.display  = r==='team' ? '' : 'none';
  document.getElementById('pwd-label').textContent   = r==='admin' ? 'Admin Password' : 'Team Password';
  document.getElementById('login-btn').textContent   = r==='admin' ? 'ENTER CONTROL ROOM' : 'SIGN IN';
  document.getElementById('auth-error').textContent  = '';
}

function togglePwd() {
  var inp=document.getElementById('password'), show=inp.type==='password';
  inp.type=show?'text':'password';
  document.getElementById('eye-show').style.display=show?'none':'';
  document.getElementById('eye-hide').style.display=show?'':'none';
}

async function loadTeams() {
  try {
    var res = await sb.from('fantasy_teams').select('id,team_name').order('team_name');
    _teams  = (res.data&&res.data.length) ? res.data : [];
  } catch(e) { _teams=[]; }
  var sel=document.getElementById('team-select');
  sel.innerHTML='<option value="">— Pick your team —</option>'+
    _teams.map(function(t){return '<option value="'+t.id+'">'+t.team_name+'</option>';}).join('');
}

async function doLogin() {
  var errEl=document.getElementById('auth-error'), btn=document.getElementById('login-btn');
  var pwd=document.getElementById('password').value.trim();
  errEl.textContent='';
  if(!pwd){errEl.textContent='Please enter your password.';return;}
  if(btn._busy)return; btn._busy=true; btn.disabled=true;
  btn.innerHTML='<span class="btn-spin"></span> Signing in…';
  try {
    if(_role==='admin') {
      var r=await sb.auth.signInWithPassword({email:'admin@bfl.in',password:pwd});
      if(r.error) throw new Error(r.error.message||'Incorrect admin password.');
      UI.navigate('admin.html');
    } else {
      var tid=document.getElementById('team-select').value;
      if(!tid) throw new Error('Please select your team first.');
      var team=_teams.find(function(t){return t.id===tid;});
      var email=Auth.teamEmail(team.team_name);
      var r2=await sb.auth.signInWithPassword({email:email,password:pwd});
      if(r2.error) throw new Error('Incorrect password. Contact the auctioneer.');
      UI.navigate('dashboard.html');
    }
  } catch(e) {
    errEl.textContent=e.message; btn._busy=false; btn.disabled=false;
    btn.textContent=_role==='admin'?'ENTER CONTROL ROOM':'SIGN IN';
  }
}

(async function init(){
  var sess=await Auth.getSession();
  if(sess){if(Auth.isAdmin(sess.user)){window.location.href='admin.html';return;}window.location.href='dashboard.html';return;}
  await loadTeams();
})();
</script>
</body>
</html>
