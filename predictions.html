<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8f135">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions — BFL Fantasy IPL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
  <main class="main">
    <div class="container">
      <div class="page-header">
        <div class="page-title">Predictions</div>
        <div class="page-sub">Predict the match · Deploy your Impact Player wisely</div>
      </div>

      <div class="usage-meter" id="usage-meter">
        <div class="usage-left-big" id="usage-left-num">—</div>
        <div class="usage-label">
          <strong>Impact Player Uses Remaining</strong>
          Select 1 player per match to score at 3× · Maximum 8 per season
        </div>
        <div class="usage-pips" id="usage-pips"></div>
      </div>

      <div class="match-tab-strip" id="match-tabs"></div>
      <div id="match-area">
        <div class="skel skel-card" style="height:380px;"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';

var _myTeamId      = null;
var _squad         = [];
var _matches       = [];
var _impactUsage   = [];
var _impactCount   = 0;
var _impactMatchMap = {};
var _activeMatchId  = null;
var _selectedWinner = null;
var _selectedImpact = null;
var _submitting     = false;

/* ── helpers ── */
function safeArr(v) { return Array.isArray(v) ? v : (v ? [v] : []); }
function avatarUrl(name) { return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name||'P') + '&background=1a2035&color=c8f135&size=128'; }
function imgTag(src, name, cls, style) {
  var s = src || avatarUrl(name);
  return '<img class="' + (cls||'') + '" src="' + UI.esc(s) + '" alt="' + UI.esc(name||'') + '"' +
    ' data-fb="' + UI.esc(avatarUrl(name)) + '"' +
    (style ? ' style="' + style + '"' : '') +
    ' onerror="this.onerror=null;this.src=this.dataset.fb">';
}

/* ── Init ── */
async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  await initNavbar('predictions');
  var team = await Auth.fetchTeam(sess.user.id);
  if (!team) { showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Team not found. Contact admin.</div></div>'); return; }
  _myTeamId = team.id;

  try {
    var results = await Promise.allSettled([loadSquad(), loadImpactUsage()]);
    results.forEach(function(r) { if (r.status === 'rejected') console.warn('[init]', r.reason); });
  } catch(e) { console.warn('[init parallel]', e); }

  renderUsageMeter();
  await loadMatches();

  // Poll every 30s to lock tabs whose deadline passed
  if (!window._lockPoll) {
    window._lockPoll = setInterval(function() {
      API.serverAutoLock().catch(function(){});
      API.fetchMatches({ limit: 40 }).then(function(r) {
        _matches = safeArr(r);
        renderMatchTabs();
      }).catch(function(){});
    }, 30000);
  }
}

async function loadSquad() {
  try {
    var raw = await API.fetchSquad(_myTeamId);
    _squad = safeArr(raw);
  } catch(e) { _squad = []; console.warn('[loadSquad]', e.message); }
}

async function loadImpactUsage() {
  try {
    var raw = await API.fetchImpactUsage(_myTeamId);
    _impactUsage = safeArr(raw);
    _impactCount = _impactUsage.length;
    _impactMatchMap = {};
    _impactUsage.forEach(function(u) { _impactMatchMap[u.match_id] = u.player_id; });
  } catch(e) { _impactUsage = []; _impactCount = 0; console.warn('[loadImpactUsage]', e.message); }
}

async function loadMatches() {
  try {
    var raw = await API.fetchMatches({ limit: 40 });
    _matches = safeArr(raw);
  } catch(e) {
    _matches = [];
    showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Could not load matches: ' + UI.esc(e.message) + '</div></div>');
    return;
  }

  if (!_matches.length) {
    document.getElementById('match-tabs').innerHTML = '';
    showArea('<div class="empty-state"><div class="empty-state-icon">🗓</div><div class="empty-state-text">No matches scheduled yet — check back soon!</div></div>');
    return;
  }

  renderMatchTabs();
  var first = _matches.find(function(m) { return !m.is_locked; }) || _matches[0];
  await setActiveMatch(first.id);
}

function showArea(html) {
  var el = document.getElementById('match-area');
  if (el) el.innerHTML = html;
}

/* ── Usage meter ── */
function renderUsageMeter() {
  var MAX  = 8;
  var left = Math.max(0, MAX - _impactCount);
  var numEl   = document.getElementById('usage-left-num');
  var pipsEl  = document.getElementById('usage-pips');
  var meterEl = document.getElementById('usage-meter');
  if (numEl)  { numEl.textContent = left; numEl.className = 'usage-left-big' + (left===0?' gone':left<=2?' low':''); }
  if (meterEl) meterEl.classList.toggle('exhausted', left===0);
  if (pipsEl) {
    var html = '';
    for (var i = 0; i < MAX; i++) {
      var filled = i < _impactCount;
      html += '<div class="usage-pip' + (filled ? (' filled' + (left===0?' gone':left<=2?' low':'')) : '') + '" style="animation-delay:' + (i*.04) + 's"></div>';
    }
    pipsEl.innerHTML = html;
  }
}

/* ── Match tabs ── */
function renderMatchTabs() {
  var strip = document.getElementById('match-tabs');
  if (!strip) return;
  strip.innerHTML = _matches.map(function(m) {
    var isDone     = m.is_locked && m.winner;
    var isLocked   = m.is_locked && !m.winner;
    var hasImpact  = !!_impactMatchMap[m.id];
    var cls = 'match-tab' +
      (isDone ? ' done' : '') +
      (isLocked ? ' locked-tab' : '') +
      (hasImpact ? ' has-impact' : '') +
      (_activeMatchId === m.id ? ' active' : '');
    return '<button class="' + cls + '" id="tab-' + m.id + '" onclick="setActiveMatch(\'' + m.id + '\')">' +
      UI.esc((m.team1||'?').split(' ').pop()) + ' vs ' + UI.esc((m.team2||'?').split(' ').pop()) +
      '</button>';
  }).join('');
}

async function setActiveMatch(matchId) {
  _activeMatchId = matchId;
  _selectedWinner = null;
  _selectedImpact = null;
  document.querySelectorAll('.match-tab').forEach(function(t) { t.classList.remove('active'); });
  var tab = document.getElementById('tab-' + matchId);
  if (tab) { tab.classList.add('active'); tab.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' }); }
  await renderMatchArea(matchId);
}

/* ── Main match area ── */
async function renderMatchArea(matchId) {
  showArea('<div class="skel skel-card" style="height:380px;"></div>');
  try {
    var m    = _matches.find(function(x) { return x.id === matchId; });
    if (!m) { showArea('<div class="empty-state"><div class="empty-state-text">Match not found</div></div>'); return; }

    var pred = null;
    var impactEntry = null;
    try { pred = await API.fetchPrediction(matchId, _myTeamId); } catch(e) {}
    if (_impactMatchMap[matchId]) {
      impactEntry = _impactUsage.find(function(u) { return u.match_id === matchId; }) || null;
    }

    if (m.is_locked && m.winner) { renderResult(m, pred, impactEntry); return; }
    if (pred)                     { renderSubmitted(m, pred, impactEntry); return; }
    if (!API.isMatchOpen(m))      { renderLocked(m, pred); return; }
    renderForm(m);
  } catch(e) {
    showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Error loading match: ' + UI.esc(e.message) + '</div></div>');
    console.error('[renderMatchArea]', e);
  }
}

/* ── FORM ── */
function renderForm(m) {
  var exhausted = _impactCount >= 8;
  showArea(
    '<div class="pred-card">' +
      matchHeader(m, '<span class="match-status status-open">Open</span>') +
      '<div class="pred-section">' +
        '<div class="pred-section-title"><span class="step-badge">1</span> Target Score (runs)</div>' +
        '<input class="form-input" type="number" id="pred-target" placeholder="e.g. 185" min="50" max="400" style="font-family:var(--f-mono);font-size:22px;font-weight:700;max-width:180px;">' +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="pred-section-title"><span class="step-badge">2</span> Predicted Winner</div>' +
        '<div class="winner-grid">' +
          '<button class="winner-btn" id="wbtn-1" onclick="selectWinner(\'' + m.id + '\',\'1\')">' + UI.esc(m.team1) + '</button>' +
          '<button class="winner-btn" id="wbtn-2" onclick="selectWinner(\'' + m.id + '\',\'2\')">' + UI.esc(m.team2) + '</button>' +
        '</div>' +
      '</div>' +
      '<div class="pred-section impact-section" id="impact-section">' +
        '<div class="pred-section-title">' +
          '<span class="step-badge" style="background:var(--gold);">3</span>' +
          ' Impact Player <span style="color:var(--gold);font-weight:700;margin-left:4px;">3×</span>' +
          '<span style="margin-left:auto;font-size:11px;color:' + (_impactCount>=6?'var(--red)':'var(--text3)') + ';">' + _impactCount + ' / 8 used</span>' +
        '</div>' +
        '<p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;">' +
          'Earn <strong style="color:var(--gold);">3× multiplier</strong> on one player\'s points. Captain &amp; VC ineligible. ' +
          (exhausted ? '<strong style="color:var(--red);">All 8 uses exhausted.</strong>' : '<strong>Optional</strong> — skip if unsure.') +
        '</p>' +
        '<div class="impact-player-grid" id="impact-grid">' + buildImpactGrid(exhausted, m) + '</div>' +
        '<div id="impact-error"></div>' +
        (exhausted ? '<div class="impact-exhausted-overlay"><div class="impact-exhausted-icon">🔒</div><div class="impact-exhausted-msg">Impact Uses Exhausted</div></div>' : '') +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="form-error" id="pred-error" style="margin-bottom:12px;"></div>' +
        '<button class="btn btn-accent btn-full" id="submit-btn" onclick="submitPrediction()" style="font-size:16px;padding:14px;">Lock In Prediction</button>' +
        '<div style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px;">Cannot be changed after submission</div>' +
      '</div>' +
    '</div>'
  );
}

function buildImpactGrid(exhausted, m) {
  var html = '<div class="impact-player-card impact-none-card selected" id="ip-none" onclick="selectImpact(null)">' +
    '<div class="impact-none-icon">—</div>' +
    '<div style="font-size:11px;font-weight:600;color:var(--text2);">No Impact</div>' +
    '<div style="font-size:10px;color:var(--text3);">Optional</div>' +
    '</div>';

  if (!_squad.length) {
    html += '<div style="grid-column:1/-1;padding:12px;color:var(--text3);font-size:13px;">Squad not loaded — reload page</div>';
    return html;
  }

  _squad.forEach(function(sp) {
    var p = sp.player;
    if (!p) return;
    var isDisabled = exhausted || sp.is_captain || sp.is_vc;
    var reason = sp.is_captain ? 'C' : sp.is_vc ? 'VC' : '';
    var clickAttr = isDisabled ? '' : ' onclick="selectImpact(\'' + p.id + '\')"';
    html += '<div class="impact-player-card' + (isDisabled ? ' disabled' : '') + '" id="ip-' + p.id + '"' + clickAttr + '>' +
      (reason ? '<span class="impact-cvc-badge">' + reason + '</span>' : '') +
      imgTag(p.image_url, p.name, 'impact-card-avatar') +
      '<div class="impact-card-name">' + UI.esc(p.name) + '</div>' +
      '<div style="margin:3px 0;">' + UI.roleBadge(p.role) + '</div>' +
      '<div style="font-size:10px;color:var(--text3);">' + UI.esc(p.ipl_team||'') + '</div>' +
      '</div>';
  });
  return html;
}

/* ── LOCKED (no prediction, past deadline, awaiting result) ── */
function renderLocked(m, pred) {
  showArea(
    '<div class="pred-card">' +
      matchHeader(m, '<span class="match-status status-locked">Locked</span>') +
      '<div class="pred-section">' +
        '<div class="locked-banner">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;flex-shrink:0;stroke:var(--red)"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>' +
          '<div><div class="locked-banner-title">Predictions Locked</div><div class="locked-banner-sub">This match is past its deadline. Results will appear after the match.</div></div>' +
        '</div>' +
        (pred ? '<div style="margin-top:14px;">' + submittedBlock(pred, null) + '</div>' :
          '<div style="margin-top:14px;color:var(--text3);font-size:13px;">No prediction was submitted for this match.</div>') +
      '</div>' +
    '</div>'
  );
}

/* ── SUBMITTED (read-only with optional impact) ── */
function renderSubmitted(m, pred, impactEntry) {
  var canAddImpact = !impactEntry && _impactCount < 8 && m && !m.is_locked && API.isMatchOpen(m);
  showArea(
    '<div class="pred-card">' +
      matchHeader(m, '<span class="match-status status-locked">Submitted</span>') +
      '<div class="pred-section">' +
        '<div style="background:var(--accent-dim);border:1px solid rgba(200,241,53,.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--accent);">Your prediction is locked in</div>' +
        submittedBlock(pred, impactEntry) +
      '</div>' +
      (canAddImpact ?
        '<div class="pred-section impact-section">' +
          '<div class="pred-section-title"><span class="step-badge" style="background:var(--gold);">+</span> Add Impact Player <span style="color:var(--gold);">3×</span>' +
          '<span style="margin-left:auto;font-size:11px;color:var(--text3);">' + _impactCount + ' / 8 used</span></div>' +
          '<p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Prediction locked, but you can still deploy an Impact Player.</p>' +
          '<div class="impact-player-grid" id="impact-grid">' + buildImpactGrid(false, m) + '</div>' +
          '<div id="impact-error"></div>' +
          '<button class="btn btn-gold" style="margin-top:12px;width:100%;" onclick="submitImpactOnly()">Lock In Impact Player</button>' +
        '</div>' : '') +
    '</div>'
  );
}

/* ── RESULT ── */
function renderResult(m, pred, impactEntry) {
  var correct = pred && pred.predicted_winner === m.winner;
  var w1 = m.winner === m.team1, w2 = m.winner === m.team2;
  showArea(
    '<div class="pred-card">' +
      matchHeader(m, '<span class="match-status status-done">Result</span>') +
      '<div class="pred-section">' +
        '<div class="winner-grid" style="margin-bottom:14px;">' +
          '<div style="background:' + (w1?'var(--accent-dim)':'var(--bg2)') + ';border:1px solid ' + (w1?'rgba(200,241,53,.3)':'var(--border)') + ';border-radius:var(--radius);padding:14px;text-align:center;">' +
            '<div style="font-family:var(--f-display);font-weight:800;font-size:15px;' + (!w1?'opacity:.5':'') + '">' + UI.esc(m.team1) + '</div>' +
            (w1?'<div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:700;">WINNER</div>':'') +
          '</div>' +
          '<div style="background:' + (w2?'var(--accent-dim)':'var(--bg2)') + ';border:1px solid ' + (w2?'rgba(200,241,53,.3)':'var(--border)') + ';border-radius:var(--radius);padding:14px;text-align:center;">' +
            '<div style="font-family:var(--f-display);font-weight:800;font-size:15px;' + (!w2?'opacity:.5':'') + '">' + UI.esc(m.team2) + '</div>' +
            (w2?'<div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:700;">WINNER</div>':'') +
          '</div>' +
        '</div>' +
        (m.actual_target ? '<div style="text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Actual Target</div><div style="font-family:var(--f-display);font-size:28px;font-weight:900;color:var(--accent);">' + m.actual_target + '</div></div>' : '') +
        (pred ? submittedBlock(pred, impactEntry, m) :
          '<div style="color:var(--text3);font-size:13px;padding:10px 0;">No prediction submitted.</div>') +
      '</div>' +
    '</div>'
  );
}

/* ── Shared helpers ── */
function matchHeader(m, badgeHtml) {
  return '<div class="pred-card-header">' +
    '<div>' +
      '<div class="pred-match-name">' + UI.esc(m.team1||'TBD') + ' vs ' + UI.esc(m.team2||'TBD') + '</div>' +
      '<div class="pred-match-meta">' + UI.fmtDate(m.match_date) + (m.venue ? ' · ' + UI.esc(m.venue) : '') + '</div>' +
    '</div>' + (badgeHtml||'') +
  '</div>';
}

function submittedBlock(pred, impactEntry, m) {
  var diff = m && m.actual_target && pred ? Math.abs((pred.target_score||0) - m.actual_target) : null;
  var correct = m && m.winner && pred ? pred.predicted_winner === m.winner : null;
  return '<div class="pred-submitted-block">' +
    '<div class="psb-row"><span class="psb-label">Target Score</span><span class="psb-value" style="font-family:var(--f-mono);">' + (pred.target_score||'—') + (diff!==null?'<span style="font-size:11px;color:var(--text3);margin-left:8px;">diff: ±'+diff+'</span>':'') + '</span></div>' +
    '<div class="psb-row"><span class="psb-label">Predicted Winner</span><span class="psb-value" style="color:' + (correct===true?'var(--green)':correct===false?'var(--red)':'inherit') + '">' + UI.esc(pred.predicted_winner||'—') + (correct===true?' ✓':correct===false?' ✗':'') + '</span></div>' +
    (impactEntry && impactEntry.player
      ? '<div class="psb-row"><span class="psb-label">Impact Player</span><span class="psb-impact-pill">⚡ ' + UI.esc(impactEntry.player.name) + ' <strong>3×</strong></span></div>'
      : '<div class="psb-row"><span class="psb-label">Impact Player</span><span style="color:var(--text3);font-size:13px;">None</span></div>') +
    (pred.submitted_at ? '<div class="psb-row"><span class="psb-label" style="font-size:11px;">Submitted</span><span style="font-size:12px;color:var(--text3);">' + UI.fmtDate(pred.submitted_at) + '</span></div>' : '') +
  '</div>';
}

/* ── Selection handlers ── */
function selectWinner(matchId, which) {
  var m = _matches.find(function(x){ return x.id === matchId; });
  if (!m) return;
  _selectedWinner = which === '1' ? m.team1 : m.team2;
  var b1 = document.getElementById('wbtn-1'), b2 = document.getElementById('wbtn-2');
  if (b1) b1.classList.toggle('active', which === '1');
  if (b2) b2.classList.toggle('active', which === '2');
}

function selectImpact(playerId) {
  document.querySelectorAll('.impact-player-card').forEach(function(c) {
    c.classList.remove('selected');
    var badge = c.querySelector('.impact-3x-badge');
    if (badge) badge.remove();
  });
  _selectedImpact = playerId;
  var errEl = document.getElementById('impact-error');
  if (errEl) errEl.innerHTML = '';

  if (!playerId) {
    var noneEl = document.getElementById('ip-none');
    if (noneEl) noneEl.classList.add('selected');
    return;
  }

  var check = API.validateImpactPlayer(_squad, playerId, _impactCount);
  if (!check.valid) {
    if (errEl) errEl.innerHTML = '<div class="impact-error"><span class="impact-error-icon">⚠</span>' + UI.esc(check.error) + '</div>';
    _selectedImpact = null;
    var ne2 = document.getElementById('ip-none');
    if (ne2) ne2.classList.add('selected');
    return;
  }

  var card = document.getElementById('ip-' + playerId);
  if (card) {
    card.classList.add('selected');
    card.insertAdjacentHTML('beforeend', '<div class="impact-3x-badge">3×</div>');
    card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

/* ── Submit prediction ── */
async function submitPrediction() {
  if (_submitting) return;
  var errEl = document.getElementById('pred-error');
  if (errEl) errEl.textContent = '';

  var matchObj = _matches.find(function(m){ return m.id === _activeMatchId; });
  if (!matchObj) { if(errEl) errEl.textContent = 'Match not found.'; return; }
  
  var targetInput = document.getElementById('pred-target');
  var target = parseInt(targetInput ? targetInput.value : '0');
  if (!target || target < 50 || target > 400) { if(errEl) errEl.textContent = 'Enter a valid target score (50–400).'; return; }
  if (!_selectedWinner) { if(errEl) errEl.textContent = 'Please select a predicted winner.'; return; }

  // ⚠️ Requirement: Confirmation Modal
  UI.showConfirm({
    icon: '🎯',
    title: 'Lock In Prediction?',
    msg: 'Target: ' + target + ' runs · Winner: ' + _selectedWinner + (_selectedImpact ? '\nImpact Player: ' + (_squad.find(s=>s.player.id===_selectedImpact)?.player.name) : ''),
    consequence: 'Predictions cannot be changed after submission.',
    okLabel: 'Lock In',
    okClass: 'btn-accent',
    onOk: async function() {
      _submitting = true;
      var btn = document.getElementById('submit-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spin"></span> Locking in…'; }

      try {
        await API.submitPrediction({ matchId:_activeMatchId, teamId:_myTeamId, targetScore:target, winner:_selectedWinner }, matchObj);

        if (_selectedImpact) {
          try {
            await API.submitImpactPlayer(_myTeamId, _activeMatchId, _selectedImpact);
            UI.toast('Impact Player locked — 3x multiplier active!', 'success', 5000);
          } catch(ie) {
            UI.toast('Prediction saved. Impact failed: ' + ie.message, 'warn', 6000);
          }
        } else {
          UI.toast('Prediction locked in!', 'success');
        }

        await loadImpactUsage();
        renderUsageMeter();
        renderMatchTabs();
        await renderMatchArea(_activeMatchId);
      } catch(e) {
        if (errEl) errEl.textContent = e.message || 'Submission failed. Try again.';
        if (btn) { btn.disabled = false; btn.textContent = 'Lock In Prediction'; }
      }
      _submitting = false;
    }
  });
}

/* ── Submit impact only (after prediction already locked) ── */
async function submitImpactOnly() {
  if (!_selectedImpact) { UI.toast('Select an Impact Player first', 'warn'); return; }
  
  var pName = _squad.find(s=>s.player.id===_selectedImpact)?.player.name || 'player';
  
  UI.showConfirm({
    icon: '⚡',
    title: 'Deploy Impact Player?',
    msg: 'Lock in ' + pName + ' as your Impact Player for this match?',
    consequence: 'This will use 1 of your 8 tournament uses. Cannot be undone.',
    okLabel: 'Deploy 3×',
    okClass: 'btn-gold',
    onOk: async function() {
      var btn = event && event.target;
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spin"></span> Locking…'; }
      try {
        await API.submitImpactPlayer(_myTeamId, _activeMatchId, _selectedImpact);
        UI.toast('Impact Player locked — 3x multiplier active!', 'success', 5000);
        await loadImpactUsage();
        renderUsageMeter();
        renderMatchTabs();
        await renderMatchArea(_activeMatchId);
      } catch(e) {
        UI.toast('Failed: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = 'Lock In Impact Player'; }
      }
    }
  });
}

init();
</script>
</div>
