<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions — BFL Fantasy IPL 2026</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Impact Player system styles ─────────────────────── */
    @keyframes impact-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(251,191,36,0); }
    }
    @keyframes impact-select {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    @keyframes pip-fill {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes warning-shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    /* Usage meter */
    .usage-meter {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .usage-meter.exhausted {
      border-color: rgba(255,77,109,0.4);
      background: rgba(255,77,109,0.04);
      animation: warning-shake 0.5s ease;
    }
    .usage-left-big {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 42px;
      line-height: 1;
      color: var(--accent);
      min-width: 48px;
      text-align: center;
      transition: color 0.3s;
    }
    .usage-left-big.low   { color: #f59e0b; }
    .usage-left-big.gone  { color: var(--red); }
    .usage-label { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .usage-label strong { color: var(--text); display: block; font-size: 15px; font-weight: 700; }
    .usage-pips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .usage-pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--bg3);
      transition: all 0.25s;
      position: relative;
    }
    .usage-pip.filled {
      background: var(--accent);
      border-color: var(--accent);
      animation: pip-fill 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .usage-pip.filled.low  { background: #f59e0b; border-color: #f59e0b; }
    .usage-pip.filled.gone { background: var(--red); border-color: var(--red); }

    /* Match tab strip */
    .match-tab-strip {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: none; margin-bottom: 24px;
    }
    .match-tab-strip::-webkit-scrollbar { display: none; }
    .match-tab {
      flex-shrink: 0; padding: 8px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--text2);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .match-tab:hover  { border-color: var(--border2); color: var(--text); }
    .match-tab.active { background: var(--accent-dim); border-color: rgba(200,241,53,0.35); color: var(--accent); }
    .match-tab.done   { background: rgba(56,217,245,0.06); border-color: rgba(56,217,245,0.2); color: var(--cyan); }
    .match-tab.has-impact { position: relative; }
    .match-tab.has-impact::after {
      content: '⚡';
      position: absolute;
      top: -6px; right: -6px;
      font-size: 12px;
      background: var(--bg);
      border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Prediction form card */
    .pred-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      animation: fade-up 0.35s ease both;
    }
    .pred-card-header {
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .pred-match-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800; line-height: 1.2;
    }
    .pred-match-meta {
      font-size: 12px; color: var(--text2); margin-top: 4px;
    }
    .pred-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .pred-section:last-child { border-bottom: none; }
    .pred-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text2); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .pred-section-title .step-badge {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); color: #000;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* Winner buttons */
    .winner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .winner-btn {
      padding: 14px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg2);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: var(--text2); cursor: pointer; transition: all 0.2s;
      text-align: center; position: relative; overflow: hidden;
    }
    .winner-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(200,241,53,0.08); opacity: 0; transition: opacity 0.15s;
    }
    .winner-btn:hover::before { opacity: 1; }
    .winner-btn:hover  { border-color: var(--accent); color: var(--text); }
    .winner-btn.active {
      background: var(--accent); color: #000; border-color: var(--accent);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .winner-btn.active::before { opacity: 0; }

    /* ── IMPACT PLAYER GRID ──────────────────────────────── */
    .impact-section {
      position: relative;
    }
    .impact-exhausted-overlay {
      position: absolute; inset: 0;
      background: rgba(7,10,18,0.7);
      backdrop-filter: blur(4px);
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; z-index: 10;
    }
    .impact-exhausted-icon { font-size: 36px; }
    .impact-exhausted-msg {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 16px; color: var(--red);
    }
    .impact-exhausted-sub { font-size: 13px; color: var(--text2); }

    .impact-player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .impact-player-card {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 10px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .impact-player-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(251,191,36,0.08), transparent 70%);
      opacity: 0; transition: opacity 0.2s;
    }
    .impact-player-card:hover {
      border-color: rgba(251,191,36,0.5);
      transform: translateY(-3px);
    }
    .impact-player-card:hover::before { opacity: 1; }
    .impact-player-card.disabled {
      opacity: 0.35; pointer-events: none;
    }
    .impact-player-card.selected {
      border-color: var(--gold);
      background: rgba(245,200,66,0.08);
      animation: impact-select 0.4s ease, impact-pulse 2s infinite 0.4s;
    }
    .impact-player-card.selected::before { opacity: 1; }
    .impact-card-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 8px;
      border: 2px solid var(--border);
      background: var(--bg3);
      transition: border-color 0.2s;
    }
    .impact-player-card.selected .impact-card-avatar { border-color: var(--gold); }
    .impact-card-name {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 12px; line-height: 1.3;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .impact-card-role {
      font-size: 10px; color: var(--text2); margin-top: 2px;
    }
    .impact-card-team {
      font-size: 10px; color: var(--text3); margin-top: 1px;
    }
    /* 3× badge on selected card */
    .impact-3x-badge {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--gold);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 900;
      padding: 2px 6px; border-radius: 4px;
      animation: badge-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes badge-pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    /* C/VC disabled badge */
    .impact-cvc-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(100,116,139,0.7);
      color: #e2e8f0;
      font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 3px;
      font-family: 'DM Mono', monospace;
    }
    /* "None" clear card */
    .impact-none-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; min-height: 110px;
      font-size: 12px; color: var(--text3);
      cursor: pointer;
    }
    .impact-none-card:hover { color: var(--text2); border-color: var(--border2); }
    .impact-none-card.selected {
      border-color: var(--border2);
      background: var(--bg3);
    }
    .impact-none-icon { font-size: 22px; opacity: 0.4; }

    /* Submitted / result state */
    .pred-submitted-block {
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .psb-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .psb-row:last-child { border-bottom: none; }
    .psb-label { color: var(--text2); }
    .psb-value { font-weight: 600; }
    .psb-impact-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 20px; padding: 3px 10px;
      font-size: 12px; font-weight: 700; color: var(--gold);
    }

    /* Impact confirm animation overlay */
    .impact-confirm-flash {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(245,200,66,0.07);
      pointer-events: none;
      animation: flash-fade 0.8s ease forwards;
    }
    @keyframes flash-fade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Validation error inline */
    .impact-error {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.25);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; color: var(--red);
      margin-top: 10px;
      animation: fade-up 0.2s ease;
    }
    .impact-error-icon { flex-shrink: 0; font-size: 16px; }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-wrap">
  <main class="main" style="position:relative;z-index:1;">
    <div class="container">

      <div class="page-header">
        <div class="page-title">Predictions</div>
        <div class="page-sub">Predict the match · Deploy your Impact Player wisely</div>
      </div>

      <!-- ══ IMPACT PLAYER USAGE METER ══ -->
      <div class="usage-meter" id="usage-meter">
        <div class="usage-left-big" id="usage-left-num">—</div>
        <div class="usage-label">
          <strong>Impact Player Uses Remaining</strong>
          Select 1 player per match to score at 3× · Maximum 8 per season
        </div>
        <div class="usage-pips" id="usage-pips"></div>
      </div>

      <!-- Match tabs -->
      <div class="match-tab-strip" id="match-tabs"></div>

      <!-- Active match area -->
      <div id="match-area">
        <div class="skel skel-card" style="height:420px;border-radius:20px;"></div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';

var _myTeamId     = null;
var _squad        = [];       // full squad_players rows
var _matches      = [];
var _impactUsage  = [];       // all used impact rows
var _impactCount  = 0;
var _impactMatchMap = {};     // matchId → player_id (already used)
var _activeMatchId  = null;
var _selectedWinner = null;
var _selectedImpact = null;   // player_id being selected (unsaved)
var _submitting     = false;

// ── Init ──────────────────────────────────────────────────────
async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  await initNavbar('predictions');
  var team = await Auth.fetchTeam(sess.user.id);
  if (!team) return;
  _myTeamId = team.id;

  await Promise.all([loadSquad(), loadImpactUsage()]);
  renderUsageMeter();
  await loadMatches();
}

async function loadSquad() {
  _squad = await API.fetchSquad(_myTeamId);
}

async function loadImpactUsage() {
  _impactUsage = await API.fetchImpactUsage(_myTeamId);
  _impactCount = _impactUsage.length;
  _impactMatchMap = {};
  _impactUsage.forEach(function(u) {
    _impactMatchMap[u.match_id] = u.player_id;
  });
}

async function loadMatches() {
  try {
    _matches = await API.fetchMatches({ limit: 40 });
    if (!_matches.length) {
      document.getElementById('match-tabs').innerHTML = '';
      document.getElementById('match-area').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">🗓️</div><div class="empty-state-text">No matches scheduled yet</div></div>';
      return;
    }
    renderMatchTabs();
    var first = _matches.find(function(m){ return !m.is_locked; }) || _matches[0];
    await setActiveMatch(first.id);
  } catch(e) { UI.toast('Failed to load matches: ' + e.message, 'error'); }
}

// ── Usage meter ────────────────────────────────────────────────
function renderUsageMeter() {
  var MAX = 8;
  var used = _impactCount;
  var left = Math.max(0, MAX - used);
  var meter = document.getElementById('usage-meter');
  var numEl = document.getElementById('usage-left-num');
  var pipsEl = document.getElementById('usage-pips');

  numEl.textContent = left;
  numEl.className = 'usage-left-big' + (left === 0 ? ' gone' : left <= 2 ? ' low' : '');
  meter.classList.toggle('exhausted', left === 0);

  var pips = '';
  for (var i = 0; i < MAX; i++) {
    var filled = i < used;
    var cls = filled ? ('filled' + (left === 0 ? ' gone' : left <= 2 ? ' low' : '')) : '';
    pips += '<div class="usage-pip ' + cls + '" style="animation-delay:' + (i * 0.04) + 's" title="' + (filled ? 'Used' : 'Available') + '"></div>';
  }
  pipsEl.innerHTML = pips;
}

// ── Match tabs ──────────────────────────────────────────────────
function renderMatchTabs() {
  var strip = document.getElementById('match-tabs');
  strip.innerHTML = _matches.map(function(m) {
    var isDone      = m.is_locked && m.winner;
    var hasImpact   = !!_impactMatchMap[m.id];
    return '<button class="match-tab' +
      (isDone ? ' done' : '') +
      (hasImpact ? ' has-impact' : '') +
      '" id="tab-' + m.id + '" onclick="setActiveMatch(\'' + m.id + '\')">' +
      UI.esc(m.team1) + ' vs ' + UI.esc(m.team2) +
      '</button>';
  }).join('');
}

async function setActiveMatch(matchId) {
  _activeMatchId  = matchId;
  _selectedWinner = null;
  _selectedImpact = null;
  document.querySelectorAll('.match-tab').forEach(function(t){ t.classList.remove('active'); });
  var tab = document.getElementById('tab-' + matchId);
  if (tab) { tab.classList.add('active'); tab.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' }); }
  await renderMatchArea(matchId);
}

// ── Main match render ───────────────────────────────────────────
async function renderMatchArea(matchId) {
  var area = document.getElementById('match-area');
  area.innerHTML = '<div class="skel skel-card" style="height:420px;border-radius:20px;"></div>';

  var m    = _matches.find(function(x){ return x.id === matchId; });
  var pred = await API.fetchPrediction(matchId, _myTeamId);
  var impactEntry = _impactMatchMap[matchId]
    ? _impactUsage.find(function(u){ return u.match_id === matchId; })
    : null;

  if (m && m.is_locked && m.winner) {
    renderResult(m, pred, impactEntry, area); return;
  }
  if (pred) {
    renderSubmitted(m, pred, impactEntry, area); return;
  }
  renderForm(m, area);
}

// ── FORM (open match, no prediction yet) ───────────────────────
function renderForm(m, area) {
  var exhausted = _impactCount >= 8;

  area.innerHTML =
    '<div class="pred-card">' +

    // Header
    '<div class="pred-card-header">' +
      '<div>' +
        '<div class="pred-match-name">' + UI.esc(m.team1) + ' vs ' + UI.esc(m.team2) + '</div>' +
        '<div class="pred-match-meta">📅 ' + UI.fmtDate(m.match_date) + (m.venue ? ' · 📍 ' + UI.esc(m.venue) : '') + '</div>' +
      '</div>' +
      '<span class="match-status status-open">Open</span>' +
    '</div>' +

    // Step 1 — Target score
    '<div class="pred-section">' +
      '<div class="pred-section-title"><span class="step-badge">1</span> Target Score (runs)</div>' +
      '<input class="form-input" type="number" id="pred-target" placeholder="e.g. 185" min="50" max="400"' +
        ' style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:700;letter-spacing:2px;max-width:180px;">' +
    '</div>' +

    // Step 2 — Winner
    '<div class="pred-section">' +
      '<div class="pred-section-title"><span class="step-badge">2</span> Predicted Winner</div>' +
      '<div class="winner-grid">' +
        '<button class="winner-btn" id="wbtn-1" onclick="selectWinner(\'' + UI.esc(m.team1) + '\')">' + UI.esc(m.team1) + '</button>' +
        '<button class="winner-btn" id="wbtn-2" onclick="selectWinner(\'' + UI.esc(m.team2) + '\')">' + UI.esc(m.team2) + '</button>' +
      '</div>' +
    '</div>' +

    // Step 3 — Impact Player
    '<div class="pred-section impact-section" id="impact-section">' +
      '<div class="pred-section-title">' +
        '<span class="step-badge" style="background:var(--gold);">⚡</span>' +
        'Impact Player <span style="color:var(--gold);font-weight:700;">3×</span>' +
        '<span style="margin-left:auto;font-size:11px;color:' + (_impactCount >= 6 ? 'var(--red)' : 'var(--text3)') + ';">' +
          (_impactCount) + ' / 8 used</span>' +
      '</div>' +
      '<p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;">' +
        'One player earns <strong style="color:var(--gold);">3× multiplier</strong> on all their points this match. ' +
        'Captain & Vice Captain are ineligible (they already have multipliers). ' +
        (exhausted ? '<strong style="color:var(--red);">All 8 uses exhausted.</strong>' : '<strong>Optional</strong> — skip if unsure.') +
      '</p>' +
      '<div class="impact-player-grid" id="impact-grid">' +
        buildImpactGrid(exhausted) +
      '</div>' +
      '<div id="impact-error"></div>' +
      (exhausted ? '<div class="impact-exhausted-overlay"><div class="impact-exhausted-icon">🔒</div><div class="impact-exhausted-msg">Impact Uses Exhausted</div><div class="impact-exhausted-sub">All 8 uses have been spent</div></div>' : '') +
    '</div>' +

    // Footer — submit
    '<div class="pred-section">' +
      '<div id="pred-error" class="form-error" style="margin-bottom:12px;"></div>' +
      '<button class="btn btn-accent btn-full" id="submit-btn" onclick="submitPrediction()" style="font-size:16px;padding:14px;">' +
        'Lock In Prediction 🔒' +
      '</button>' +
      '<div style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px;">Once submitted, predictions cannot be changed · Impact Player locked permanently</div>' +
    '</div>' +
    '</div>';
}

function buildImpactGrid(exhausted) {
  // "No Impact" option first
  var html = '<div class="impact-player-card impact-none-card selected" id="ip-none" onclick="selectImpact(null)">' +
    '<div class="impact-none-icon">—</div>' +
    '<div style="font-size:11px;font-weight:600;color:var(--text2);">No Impact</div>' +
    '<div style="font-size:10px;color:var(--text3);">Optional</div>' +
    '</div>';

  _squad.forEach(function(sp) {
    var p   = sp.player;
    if (!p) return;
    var isDisabled = exhausted || sp.is_captain || sp.is_vc;
    var reason = sp.is_captain ? 'C' : sp.is_vc ? 'VC' : '';
    var imgSrc = p.image_url ||
      'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name) + '&background=1a2035&color=c8f135&size=128';

    html += '<div class="impact-player-card' + (isDisabled ? ' disabled' : '') + '" id="ip-' + p.id + '"' +
      (isDisabled ? '' : ' onclick="selectImpact(\'' + p.id + '\')"') + '>' +
      (reason ? '<span class="impact-cvc-badge">' + reason + '</span>' : '') +
      '<img class="impact-card-avatar" src="' + imgSrc + '" alt="" onerror="this.src=\'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name||'P') + '&background=1a2035&color=c8f135&size=128\'">' +
      '<div class="impact-card-name">' + UI.esc(p.name) + '</div>' +
      '<div class="impact-card-role">' + UI.roleBadge(p.role) + '</div>' +
      '<div class="impact-card-team">' + UI.esc(p.ipl_team || '') + '</div>' +
      '</div>';
  });
  return html;
}

// ── Select winner ──────────────────────────────────────────────
function selectWinner(team) {
  _selectedWinner = team;
  var m = _matches.find(function(x){ return x.id === _activeMatchId; });
  var btn1 = document.getElementById('wbtn-1');
  var btn2 = document.getElementById('wbtn-2');
  if (btn1) btn1.classList.toggle('active', team === (m && m.team1));
  if (btn2) btn2.classList.toggle('active', team === (m && m.team2));
}

// ── Select impact player ───────────────────────────────────────
function selectImpact(playerId) {
  // Clear previous selection visually
  document.querySelectorAll('.impact-player-card').forEach(function(c){
    c.classList.remove('selected');
    var badge = c.querySelector('.impact-3x-badge');
    if (badge) badge.remove();
  });

  _selectedImpact = playerId;

  // Clear any error
  var errEl = document.getElementById('impact-error');
  if (errEl) errEl.innerHTML = '';

  if (!playerId) {
    // "No Impact" selected
    var noneEl = document.getElementById('ip-none');
    if (noneEl) noneEl.classList.add('selected');
    return;
  }

  // Client-side pre-validate immediately for instant feedback
  var check = API.validateImpactPlayer(_squad, playerId, _impactCount);
  if (!check.valid) {
    var errEl2 = document.getElementById('impact-error');
    if (errEl2) {
      errEl2.innerHTML = '<div class="impact-error"><span class="impact-error-icon">⚠️</span>' + UI.esc(check.error) + '</div>';
    }
    _selectedImpact = null;
    var noneEl2 = document.getElementById('ip-none');
    if (noneEl2) noneEl2.classList.add('selected');
    return;
  }

  // Highlight selected card
  var card = document.getElementById('ip-' + playerId);
  if (card) {
    card.classList.add('selected');
    card.insertAdjacentHTML('beforeend', '<div class="impact-3x-badge">3×</div>');
    card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

// ── Submit ─────────────────────────────────────────────────────
async function submitPrediction() {
  if (_submitting) return;
  var btn   = document.getElementById('submit-btn');
  var errEl = document.getElementById('pred-error');
  errEl.textContent = '';

  var target = parseInt(document.getElementById('pred-target')?.value || '0');
  if (!target || target < 50 || target > 400) {
    errEl.textContent = 'Enter a valid target score (50–400).'; return;
  }
  if (!_selectedWinner) {
    errEl.textContent = 'Please select a predicted winner.'; return;
  }

  _submitting = true;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spin"></span> Locking in…';

  try {
    // 1. Submit prediction (target + winner)
    await API.submitPrediction({
      matchId:      _activeMatchId,
      teamId:       _myTeamId,
      targetScore:  target,
      winner:       _selectedWinner,
    });

    // 2. Submit impact player if selected
    if (_selectedImpact) {
      try {
        await API.submitImpactPlayer(_myTeamId, _activeMatchId, _selectedImpact);

        // Flash effect
        var flash = document.createElement('div');
        flash.className = 'impact-confirm-flash';
        document.body.appendChild(flash);
        setTimeout(function(){ flash.remove(); }, 800);

        UI.toast('⚡ Impact Player locked — 3× multiplier active!', 'success', 5000);
      } catch(impactErr) {
        // Prediction saved but impact failed — show specific error
        UI.toast('Prediction saved, but Impact Player failed: ' + impactErr.message, 'warn', 6000);
        _selectedImpact = null;
      }
    } else {
      UI.toast('Prediction locked in! 🔒', 'success');
    }

    // Reload impact usage state
    await loadImpactUsage();
    renderUsageMeter();
    renderMatchTabs();
    await renderMatchArea(_activeMatchId);

  } catch(e) {
    errEl.textContent = e.message || 'Submission failed. Try again.';
    btn.disabled = false;
    btn.textContent = 'Lock In Prediction 🔒';
  }
  _submitting = false;
}

// ── Submitted (read-only) ──────────────────────────────────────
function renderSubmitted(m, pred, impactEntry, area) {
  var impactHtml = '';
  if (impactEntry && impactEntry.player) {
    impactHtml =
      '<div class="psb-row">' +
        '<span class="psb-label">⚡ Impact Player</span>' +
        '<span class="psb-impact-pill">⚡ ' + UI.esc(impactEntry.player.name) + ' <strong>3×</strong></span>' +
      '</div>';
  } else {
    impactHtml =
      '<div class="psb-row">' +
        '<span class="psb-label">⚡ Impact Player</span>' +
        '<span style="color:var(--text3);font-size:13px;">None selected</span>' +
      '</div>';
  }

  // Allow adding impact player if prediction submitted but impact not yet set
  var canAddImpact = !impactEntry && _impactCount < 8 && !(m && m.is_locked);
  var addImpactHtml = '';
  if (canAddImpact) {
    addImpactHtml =
      '<div class="pred-section impact-section">' +
        '<div class="pred-section-title">' +
          '<span class="step-badge" style="background:var(--gold);">⚡</span>' +
          'Add Impact Player <span style="color:var(--gold);">3×</span>' +
          '<span style="margin-left:auto;font-size:11px;color:var(--text3);">' + _impactCount + ' / 8 used</span>' +
        '</div>' +
        '<p style="font-size:12px;color:var(--text2);margin-bottom:14px;">Your prediction is locked, but you can still deploy an Impact Player for this match.</p>' +
        '<div class="impact-player-grid" id="impact-grid">' +
          buildImpactGrid(false) +
        '</div>' +
        '<div id="impact-error"></div>' +
        '<button class="btn btn-gold" style="margin-top:14px;width:100%;" onclick="submitImpactOnly()">⚡ Lock In Impact Player</button>' +
      '</div>';
  }

  area.innerHTML =
    '<div class="pred-card">' +
    '<div class="pred-card-header">' +
      '<div>' +
        '<div class="pred-match-name">' + UI.esc(m && m.team1 || '—') + ' vs ' + UI.esc(m && m.team2 || '—') + '</div>' +
        '<div class="pred-match-meta">📅 ' + UI.fmtDate(m && m.match_date) + '</div>' +
      '</div>' +
      '<span class="match-status status-locked">Submitted</span>' +
    '</div>' +
    '<div class="pred-section">' +
      '<div style="background:var(--accent-dim);border:1px solid rgba(200,241,53,0.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:14px;color:var(--accent);">✓ Your prediction has been locked in</div>' +
      '<div class="pred-submitted-block">' +
        '<div class="psb-row"><span class="psb-label">Target Score</span><span class="psb-value font-mono">' + (pred.target_score || '—') + '</span></div>' +
        '<div class="psb-row"><span class="psb-label">Predicted Winner</span><span class="psb-value">' + UI.esc(pred.predicted_winner || '—') + '</span></div>' +
        impactHtml +
        '<div class="psb-row"><span class="psb-label" style="font-size:12px;color:var(--text3);">Submitted</span><span style="font-size:12px;color:var(--text3);">' + UI.fmtDate(pred.submitted_at) + '</span></div>' +
      '</div>' +
    '</div>' +
    addImpactHtml +
    '</div>';
}

// Submit impact only (after prediction already locked)
async function submitImpactOnly() {
  if (!_selectedImpact) { UI.toast('Select an Impact Player first', 'warn'); return; }
  var btn = event.target;
  btn.disabled = true; btn.innerHTML = '<span class="btn-spin"></span> Locking…';
  try {
    await API.submitImpactPlayer(_myTeamId, _activeMatchId, _selectedImpact);
    var flash = document.createElement('div');
    flash.className = 'impact-confirm-flash';
    document.body.appendChild(flash);
    setTimeout(function(){ flash.remove(); }, 800);
    UI.toast('⚡ Impact Player locked — 3× multiplier active!', 'success', 5000);
    await loadImpactUsage();
    renderUsageMeter();
    renderMatchTabs();
    await renderMatchArea(_activeMatchId);
  } catch(e) {
    UI.toast('Failed: ' + e.message, 'error');
    btn.disabled = false; btn.innerHTML = '⚡ Lock In Impact Player';
  }
}

// ── Result state ───────────────────────────────────────────────
function renderResult(m, pred, impactEntry, area) {
  var correct = pred && pred.predicted_winner === m.winner;
  var impactHtml = '';
  if (impactEntry && impactEntry.player) {
    impactHtml =
      '<div class="psb-row">' +
        '<span class="psb-label">⚡ Impact Player</span>' +
        '<span class="psb-impact-pill">⚡ ' + UI.esc(impactEntry.player.name) + ' <strong>3×</strong></span>' +
      '</div>';
  }

  area.innerHTML =
    '<div class="pred-card">' +
    '<div class="pred-card-header">' +
      '<div>' +
        '<div class="pred-match-name">' + UI.esc(m.team1) + ' vs ' + UI.esc(m.team2) + '</div>' +
        '<div class="pred-match-meta">📅 ' + UI.fmtDate(m.match_date) + '</div>' +
      '</div>' +
      '<span class="match-status status-done">Result</span>' +
    '</div>' +
    '<div class="pred-section">' +
      '<div class="winner-grid" style="margin-bottom:14px;">' +
        '<div style="background:' + (m.winner === m.team1 ? 'var(--accent-dim)' : 'var(--bg2)') + ';border:1px solid ' + (m.winner === m.team1 ? 'rgba(200,241,53,0.3)' : 'var(--border)') + ';border-radius:var(--radius);padding:16px;text-align:center;">' +
          '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:16px;' + (m.winner !== m.team1 ? 'opacity:0.5' : '') + '">' + UI.esc(m.team1) + '</div>' +
          (m.winner === m.team1 ? '<div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:700;">WINNER</div>' : '') +
        '</div>' +
        '<div style="background:' + (m.winner === m.team2 ? 'var(--accent-dim)' : 'var(--bg2)') + ';border:1px solid ' + (m.winner === m.team2 ? 'rgba(200,241,53,0.3)' : 'var(--border)') + ';border-radius:var(--radius);padding:16px;text-align:center;">' +
          '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:16px;' + (m.winner !== m.team2 ? 'opacity:0.5' : '') + '">' + UI.esc(m.team2) + '</div>' +
          (m.winner === m.team2 ? '<div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:700;">WINNER</div>' : '') +
        '</div>' +
      '</div>' +
      (m.actual_target ? '<div style="text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Actual Target</div><div style="font-family:\'Syne\',sans-serif;font-size:28px;font-weight:800;color:var(--accent);">' + m.actual_target + '</div></div>' : '') +
      (pred ? '<div class="pred-submitted-block">' +
        '<div class="psb-row"><span class="psb-label">Your Target</span><span class="psb-value font-mono">' + (pred.target_score || '—') + (m.actual_target ? '<span style="font-size:11px;color:var(--text3);margin-left:6px;">diff: ' + Math.abs((pred.target_score||0) - m.actual_target) + '</span>' : '') + '</span></div>' +
        '<div class="psb-row"><span class="psb-label">Your Winner Pick</span><span class="psb-value" style="color:' + (correct ? 'var(--green)' : 'var(--red)') + '">' + UI.esc(pred.predicted_winner || '—') + ' ' + (correct ? '✓' : '✗') + '</span></div>' +
        impactHtml +
      '</div>' : '<div style="color:var(--text3);font-size:13px;padding:12px 0;">No prediction submitted for this match.</div>') +
    '</div>' +
    '</div>';
}

init();
</script>
</body>
</html>
