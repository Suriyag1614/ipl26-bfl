<!DOCTYPE html>
<!-- v2.0.0-daily-predictions -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/bfl/bfl-logo.png">
  <meta name="theme-color" content="#f0b429">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - BFL Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Prediction-specific enhancements ── */
    .pred-status-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 16px; border-radius: 8px; margin-bottom: 14px;
      font-family: var(--f-ui); font-size: 12px; font-weight: 700;
    }
    .pred-status-bar.open     { background: var(--accent-dim); border: 1px solid rgba(200,241,53,.25); color: var(--accent); }
    .pred-status-bar.warning  { background: rgba(245,180,41,.08); border: 1px solid rgba(245,180,41,.3); color: #f5b429; }
    .pred-status-bar.locked   { background: var(--red-dim); border: 1px solid rgba(255,77,109,.25); color: var(--red); }
    .pred-status-bar.done     { background: var(--cyan-dim); border: 1px solid rgba(56,217,245,.25); color: var(--cyan); }
    .pred-status-bar.abandoned { background: rgba(167,139,250,.08); border: 1px solid rgba(167,139,250,.3); color: var(--purple); }
    .pred-status-bar.dls      { background: rgba(245,200,66,.08); border: 1px solid rgba(245,200,66,.3); color: var(--gold); }

    /* Score accuracy indicator */
    .accuracy-ring {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-display); font-weight: 900; font-size: 14px;
      border: 3px solid var(--border);
    }
    .accuracy-ring.exact   { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .accuracy-ring.close   { border-color: var(--green);  color: var(--green);  background: rgba(45,212,191,.08); }
    .accuracy-ring.good    { border-color: var(--cyan);   color: var(--cyan);   background: var(--cyan-dim); }
    .accuracy-ring.near    { border-color: var(--gold);   color: var(--gold);   background: var(--gold-dim); }
    .accuracy-ring.miss    { border-color: var(--red);    color: var(--red);    background: var(--red-dim); }

    /* Result card */
    .result-comparison {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px;
      align-items: center; margin: 14px 0;
    }
    .result-box {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .result-box.correct { border-color: var(--accent); background: var(--accent-dim); }
    .result-box.wrong   { border-color: rgba(255,77,109,.3); background: var(--red-dim); }
    .result-box-label   { font-size: 10px; font-family: var(--f-ui); font-weight: 700;
                          text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 4px; }
    .result-box-val     { font-family: var(--f-display); font-weight: 900; font-size: 22px; }
    .result-vs          { font-family: var(--f-ui); font-size: 11px; color: var(--text3); font-weight: 800; text-align: center; }

    /* Impact toggle enhanced */
    .impact-banner {
      background: linear-gradient(135deg, rgba(56,217,245,.07), rgba(200,241,53,.04));
      border: 1px solid rgba(56,217,245,.2); border-radius: 12px;
      padding: 16px; margin-top: 12px;
    }
    .impact-banner.active-state {
      background: linear-gradient(135deg, rgba(56,217,245,.14), rgba(200,241,53,.06));
      border-color: var(--cyan); box-shadow: 0 0 20px rgba(56,217,245,.12);
    }
    .impact-banner.exhausted {
      background: var(--red-dim); border-color: rgba(255,77,109,.3);
      opacity: .7; cursor: not-allowed;
    }
    .impact-player-row {
      display: flex; align-items: center; gap: 12px;
    }
    .impact-player-info { flex: 1; }
    .impact-player-name { font-family: var(--f-display); font-weight: 900; font-size: 16px; }
    .impact-player-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .impact-multiplier-badge {
      font-family: var(--f-display); font-weight: 900; font-size: 20px;
      padding: 4px 12px; border-radius: 8px; flex-shrink: 0;
    }
    .impact-multiplier-badge.on  { background: var(--cyan); color: #000; }
    .impact-multiplier-badge.off { background: var(--bg3); color: var(--text3); }

    /* Points preview */
    .pts-preview-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .pts-preview-row:last-child { border-bottom: none; }
    .pts-preview-label { color: var(--text2); }
    .pts-preview-val   { font-family: var(--f-mono); font-weight: 700; color: var(--accent); }
    .pts-preview-val.zero { color: var(--text3); }

    /* Abandoned overlay */
    .abandoned-banner {
      background: rgba(167,139,250,.08); border: 1px solid rgba(167,139,250,.3);
      border-radius: 12px; padding: 18px; text-align: center; margin: 16px 0;
    }
    .abandoned-icon { font-size: 36px; margin-bottom: 8px; }
    .abandoned-title { font-family: var(--f-display); font-size: 18px; font-weight: 900; color: var(--purple); margin-bottom: 6px; }
    .abandoned-sub   { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* DLS badge */
    .dls-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(245,200,66,.12); border: 1px solid rgba(245,200,66,.3);
      border-radius: 6px; padding: 3px 9px; font-family: var(--f-ui);
      font-size: 11px; font-weight: 800; color: var(--gold);
    }

    /* Prediction points earned */
    .pts-earned-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim); border: 1px solid rgba(200,241,53,.3);
      border-radius: 20px; padding: 5px 14px; font-family: var(--f-display);
      font-weight: 900; font-size: 16px; color: var(--accent);
    }
    .pts-earned-chip.zero { background: var(--bg3); border-color: var(--border); color: var(--text3); }
    .pts-earned-chip.abandoned { background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.3); color: var(--purple); }

    /* Match header with score */
    .match-score-display {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      margin: 12px 0; flex-wrap: wrap;
    }
    .match-score-team {
      text-align: center; flex: 1; min-width: 80px;
    }
    .match-score-name { font-family: var(--f-ui); font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; }
    .match-score-num  { font-family: var(--f-display); font-weight: 900; font-size: 26px; }
    .match-score-num.winner-team { color: var(--accent); }
    .match-score-divider { font-family: var(--f-display); font-size: 13px; color: var(--text3); font-weight: 800; }

    /* Responsive */
    @media (max-width: 500px) {
      .result-comparison { grid-template-columns: 1fr; }
      .result-vs { display: none; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
  <main class="main">
    <div class="container">
      <div class="page-header">
        <div class="page-title">Daily Predictions</div>
        <div class="page-sub">Predict target · Pick winner · Deploy Impact Player wisely</div>
      </div>

      <!-- Impact usage meter -->
      <div class="usage-meter" id="usage-meter">
        <div class="usage-left-big" id="usage-left-num">—</div>
        <div class="usage-label">
          <strong>Impact Player Uses Remaining</strong>
          3× multiplier · Max 8 per season · Abandoned matches don't count
        </div>
        <div class="usage-pips" id="usage-pips"></div>
      </div>

      <!-- Match tab strip -->
      <div class="match-tab-strip" id="match-tabs"></div>

      <!-- Main prediction area -->
      <div id="match-area">
        <div class="skel skel-card" style="height:420px;"></div>
      </div>
    </div>
  </main>
</div>

<!-- Confirmation modal (reused from UI.showConfirm) -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
var _myTeamId       = null;
var _squad          = [];
var _matches        = [];
var _impactStats    = { used: 0, total: 8 };
var _impactMatchMap = {}; // matchId -> is_active
var _activeMatchId  = null;
var _selectedWinner = null;
var _impactActive   = false;
var _submitting     = false;
var _lockPoll       = null;
var _cdTimers       = {}; // countdown intervals keyed by matchId

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function safeArr(v) { return Array.isArray(v) ? v : (v ? [v] : []); }

function avatarUrl(name) {
  return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name || 'P') + '&background=1a2035&color=c8f135&size=128';
}

function imgTag(src, name, cls, style) {
  var s = src || avatarUrl(name);
  return '<img class="' + (cls || '') + '" src="' + UI.esc(s) + '"' +
    ' alt="' + UI.esc(name || '') + '"' +
    ' data-fb="' + UI.esc(avatarUrl(name)) + '"' +
    (style ? ' style="' + style + '"' : '') +
    ' onerror="this.onerror=null;this.src=this.dataset.fb">';
}

/** Returns { label, cls } for status badge */
function matchStatusInfo(m) {
  if (!m) return { label: '—', cls: '' };
  if (m.status === 'abandoned') return { label: '☔ Abandoned', cls: 'abandoned' };
  if (m.status === 'completed' || m.status === 'processed') return { label: '✓ Completed', cls: 'done' };
  if (m.is_locked || m._client_locked) {
    if (m.winner) return { label: '✓ Result In', cls: 'done' };
    return { label: '🔒 Locked', cls: 'locked' };
  }
  var lock = API.getLockTime(m);
  if (lock && lock <= new Date()) return { label: '🔒 Locked', cls: 'locked' };
  var secs = API.secondsToLock(m);
  if (secs !== null && secs < 300) return { label: '⚠️ Closing Soon', cls: 'warning' };
  return { label: '● Open', cls: 'open' };
}

/** Calculate prediction points (mirrors api.js but client-side for preview). */
function calcPredPts(pred, match) {
  if (!pred || !match) return { target: 0, winner: 0, total: 0 };
  if (match.status === 'abandoned') return { target: 0, winner: 0, total: 0, abandoned: true };
  var targetPts = 0, winnerPts = 0;
  if (match.actual_target != null && pred.target_score != null) {
    var diff = Math.abs(Number(pred.target_score) - Number(match.actual_target));
    if      (diff === 0) targetPts = 250;
    else if (diff === 1) targetPts = 150;
    else if (diff <= 5)  targetPts = 100;
    else if (diff <= 10) targetPts = 50;
  }
  if (match.winner && pred.predicted_winner === match.winner) winnerPts = 25;
  return { target: targetPts, winner: winnerPts, total: targetPts + winnerPts };
}

/** Ring class for target diff. */
function accuracyRingCls(diff) {
  if (diff === null) return '';
  if (diff === 0)  return 'exact';
  if (diff === 1)  return 'close';
  if (diff <= 5)   return 'good';
  if (diff <= 10)  return 'near';
  return 'miss';
}

function accuracyLabel(diff) {
  if (diff === null) return '?';
  if (diff === 0)  return 'Exact!';
  if (diff === 1)  return '±1';
  if (diff <= 5)   return '±' + diff;
  if (diff <= 10)  return '±' + diff;
  return '±' + diff;
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  await initNavbar('predictions');

  var team = await Auth.fetchTeam(sess.user.id);
  if (!team) {
    showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Team not found. Contact admin.</div></div>');
    return;
  }
  _myTeamId = team.id;

  try { await Promise.all([loadSquad(), loadImpactStats()]); } catch(e) { console.warn('[init parallel]', e); }
  renderUsageMeter();
  await loadMatches();

  // Poll every 30s to catch server-side auto-locks and deadline changes
  if (!_lockPoll) {
    _lockPoll = setInterval(async function() {
      try {
        await API.serverAutoLock();
        var fresh = safeArr(await API.fetchMatches({ limit: 40 }));
        _matches = fresh;
        renderMatchTabs();
        // Refresh current match area if lock state may have changed
        if (_activeMatchId) {
          var m = _matches.find(function(x) { return x.id === _activeMatchId; });
          if (m && !API.isPredOpen(m)) await renderMatchArea(_activeMatchId);
        }
      } catch(e) {}
    }, 30000);
  }
}

/* ══════════════════════════════════════════════════════════════
   DATA LOADERS
══════════════════════════════════════════════════════════════ */
async function loadSquad() {
  try { _squad = safeArr(await API.fetchSquad(_myTeamId)); }
  catch(e) { _squad = []; console.warn('[loadSquad]', e.message); }
}

async function loadImpactStats() {
  try { _impactStats = await API.fetchImpactStats(_myTeamId); }
  catch(e) { _impactStats = { used: 0, total: 8 }; }
}

async function loadMatches() {
  try {
    var raw = safeArr(await API.fetchMatches({ limit: 40 }));
    _matches = raw;
  } catch(e) {
    _matches = [];
    showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Could not load matches: ' + UI.esc(e.message) + '</div></div>');
    return;
  }

  if (!_matches.length) {
    document.getElementById('match-tabs').innerHTML = '';
    showArea('<div class="empty-state"><div class="empty-state-icon">🗓</div><div class="empty-state-text">No matches scheduled yet — check back soon!</div></div>');
    return;
  }

  renderMatchTabs();

  // Deep-link: if ?match= in URL, open that match
  var params = new URLSearchParams(window.location.search);
  var mid = params.get('match');
  var first = mid ? (_matches.find(function(m) { return m.id === mid; }) || _matches[0]) :
                    (_matches.find(function(m) { return API.isPredOpen(m); }) || _matches[0]);
  if (first) await setActiveMatch(first.id);
}

/* ══════════════════════════════════════════════════════════════
   USAGE METER
══════════════════════════════════════════════════════════════ */
function renderUsageMeter() {
  var MAX  = _impactStats.total || 8;
  var used = _impactStats.used  || 0;
  var left = Math.max(0, MAX - used);

  var numEl   = document.getElementById('usage-left-num');
  var pipsEl  = document.getElementById('usage-pips');
  var meterEl = document.getElementById('usage-meter');

  if (numEl) {
    numEl.textContent = left;
    numEl.className = 'usage-left-big' + (left === 0 ? ' gone' : left <= 2 ? ' low' : '');
  }
  if (meterEl) meterEl.classList.toggle('exhausted', left === 0);
  if (pipsEl) {
    var html = '';
    for (var i = 0; i < MAX; i++) {
      html += '<div class="usage-pip' + (i < used ? ' filled' + (left === 0 ? ' gone' : left <= 2 ? ' low' : '') : '') + '" style="animation-delay:' + (i * .04) + 's" title="' + (i < used ? 'Used' : 'Available') + '"></div>';
    }
    pipsEl.innerHTML = html;
  }
}

/* ══════════════════════════════════════════════════════════════
   MATCH TABS
══════════════════════════════════════════════════════════════ */
function renderMatchTabs() {
  var strip = document.getElementById('match-tabs');
  if (!strip) return;
    strip.innerHTML = _matches.map(function(m) {
      var si  = matchStatusInfo(m);
      var hasImpact = !!_impactMatchMap[m.id];
      var cls = 'match-tab' +
        (si.cls === 'done'      ? ' done'       : '') +
        (si.cls === 'locked'    ? ' locked-tab' : '') +
        (si.cls === 'abandoned' ? ' locked-tab' : '') +
        (hasImpact              ? ' has-impact'  : '') +
        (_activeMatchId === m.id ? ' active'    : '');
      var t1s = UI.tShort(m.team1), t2s = UI.tShort(m.team2);
      var label = UI.esc(t1s) + ' vs ' + UI.esc(t2s);
      return '<button class="' + cls + '" id="tab-' + m.id + '" onclick="setActiveMatch(\'' + m.id + '\')">' + label + '</button>';
    }).join('');
}

/* ══════════════════════════════════════════════════════════════
   ACTIVE MATCH
══════════════════════════════════════════════════════════════ */
async function setActiveMatch(matchId) {
  _activeMatchId  = matchId;
  _selectedWinner = null;
  _impactActive   = false;

  // Clear old countdown for previously active match
  Object.keys(_cdTimers).forEach(function(k) { clearInterval(_cdTimers[k]); });
  _cdTimers = {};

  document.querySelectorAll('.match-tab').forEach(function(t) { t.classList.remove('active'); });
  var tab = document.getElementById('tab-' + matchId);
  if (tab) { tab.classList.add('active'); tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }

  window.history.replaceState(null, '', '?match=' + matchId);

  try {
    _impactActive = await API.fetchImpactActivation(_myTeamId, matchId);
    _impactMatchMap[matchId] = _impactActive;
    renderMatchTabs();
  } catch(e) {}

  await renderMatchArea(matchId);
}

/* ══════════════════════════════════════════════════════════════
   MAIN MATCH AREA ROUTER
══════════════════════════════════════════════════════════════ */
async function renderMatchArea(matchId) {
  showArea('<div class="skel skel-card" style="height:420px;"></div>');
  try {
    var m = _matches.find(function(x) { return x.id === matchId; });
    if (!m) { showArea('<div class="empty-state"><div class="empty-state-text">Match not found</div></div>'); return; }

    var pred = null;
    try { pred = await API.fetchPrediction(matchId, _myTeamId); } catch(e) {}

    var ia = !!_impactMatchMap[matchId];

    // Route to correct view
    if (m.status === 'abandoned') {
      renderAbandoned(m, pred, ia);
    } else if (m.is_locked && m.winner) {
      renderResult(m, pred, ia);
    } else if (!API.isPredOpen(m)) {
      renderLocked(m, pred, ia);
    } else if (pred) {
      renderSubmitted(m, pred, ia);
    } else {
      renderForm(m);
    }
  } catch(e) {
    showArea('<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Error: ' + UI.esc(e.message) + '</div></div>');
    console.error('[renderMatchArea]', e);
  }
}

function showArea(html) {
  var el = document.getElementById('match-area');
  if (el) el.innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════
   VIEW: PREDICTION FORM
══════════════════════════════════════════════════════════════ */
function renderForm(m) {
  var si = matchStatusInfo(m);
  showArea(
    '<div class="pred-card">' +
      buildMatchHeader(m, si) +
      buildStatusBar(m, si) +
      buildCountdownSection(m) +
      '<div class="pred-section">' +
        '<div class="pred-section-title"><span class="step-badge">1</span> Target Score' +
          '<span style="font-size:11px;color:var(--text3);margin-left:auto;font-weight:400;">First innings score + 1</span>' +
        '</div>' +
        '<input class="form-input" type="number" id="pred-target" placeholder="e.g. 181"' +
          ' min="50" max="500" oninput="updatePtsPreview()" style="font-family:var(--f-mono);font-size:24px;font-weight:700;max-width:200px;">' +
        '<div style="font-size:12px;color:var(--text3);margin-top:6px;">Range: 50 – 500 runs</div>' +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="pred-section-title"><span class="step-badge">2</span> Predicted Winner</div>' +
        '<div class="winner-grid">' +
          '<button class="winner-btn" id="wbtn-t1" onclick="selectWinner(\'t1\')">' +
            buildTeamLogo(m.team1) + UI.esc(m.team1 || 'Team 1') +
          '</button>' +
          '<button class="winner-btn" id="wbtn-t2" onclick="selectWinner(\'t2\')">' +
            buildTeamLogo(m.team2) + UI.esc(m.team2 || 'Team 2') +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="pred-section-title">' +
          '<span class="step-badge" style="background:var(--gold);">3</span> Impact Player' +
          '<span style="color:var(--gold);font-weight:700;margin-left:6px;">3×</span>' +
          '<span style="margin-left:auto;font-size:11px;color:var(--text3);">' + _impactStats.used + ' / 8 used</span>' +
        '</div>' +
        buildImpactBanner(m) +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="card-title" style="margin-bottom:10px;">Points Preview</div>' +
        '<div id="pts-preview-wrap">' + buildPtsPreview(null, null) + '</div>' +
      '</div>' +
      '<div class="pred-section">' +
        '<div class="form-error" id="pred-error" style="margin-bottom:12px;min-height:18px;"></div>' +
        '<button class="btn btn-accent btn-full" id="submit-btn" onclick="submitPrediction()" style="font-size:16px;padding:14px;">🔒 Lock In Prediction</button>' +
        '<div style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px;">Cannot be changed after submission</div>' +
      '</div>' +
    '</div>'
  );
}

/* ══════════════════════════════════════════════════════════════
   VIEW: SUBMITTED (editable until lock)
══════════════════════════════════════════════════════════════ */
function renderSubmitted(m, pred, ia) {
  var si    = matchStatusInfo(m);
  var pts   = calcPredPts(pred, m);
  var still = isPredOpen(m);
  showArea(
    '<div class="pred-card">' +
      buildMatchHeader(m, si) +
      buildStatusBar(m, si) +
      (still ? buildCountdownSection(m) : '') +
      '<div class="pred-section">' +
        '<div style="background:var(--accent-dim);border:1px solid rgba(200,241,53,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px;">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;flex-shrink:0;"><polyline points="20 6 9 17 4 12"/></svg> Prediction locked in' +
        '</div>' +
        buildSubmittedBlock(pred, ia, m, pts) +
      '</div>' +
      (still ?
        '<div class="pred-section">' +
          '<div class="pred-section-title"><span class="step-badge" style="background:var(--gold);">⚡</span> Impact Activation' +
            '<span style="margin-left:auto;font-size:11px;color:var(--text3);">' + _impactStats.used + ' / 8 used</span>' +
          '</div>' +
          buildImpactBanner(m) +
          '<button class="btn btn-gold" style="margin-top:14px;width:100%;" onclick="submitImpactOnly()">Update Impact Status</button>' +
        '</div>' : '') +
    '</div>'
  );
}

/* ══════════════════════════════════════════════════════════════
   VIEW: LOCKED (no edit possible, awaiting result)
══════════════════════════════════════════════════════════════ */
function renderLocked(m, pred, ia) {
  var si  = matchStatusInfo(m);
  showArea(
    '<div class="pred-card">' +
      buildMatchHeader(m, si) +
      buildStatusBar(m, si) +
      '<div class="pred-section">' +
        '<div class="locked-banner">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;flex-shrink:0;stroke:var(--red)"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>' +
          '<div>' +
            '<div class="locked-banner-title">Predictions Closed</div>' +
            '<div class="locked-banner-sub">The window has passed. Results will appear after the match.</div>' +
          '</div>' +
        '</div>' +
        (pred ? buildSubmittedBlock(pred, ia, m, calcPredPts(pred, m)) :
          '<div style="color:var(--text3);font-size:13px;margin-top:12px;text-align:center;">No prediction was submitted for this match.</div>') +
      '</div>' +
    '</div>'
  );
}

/* ══════════════════════════════════════════════════════════════
   VIEW: RESULT
══════════════════════════════════════════════════════════════ */
function renderResult(m, pred, ia) {
  var si   = matchStatusInfo(m);
  var pts  = calcPredPts(pred, m);
  var diff = (pred && m.actual_target != null) ? Math.abs((pred.target_score || 0) - m.actual_target) : null;
  var ringCls = accuracyRingCls(diff);

  showArea(
    '<div class="pred-card">' +
      buildMatchHeader(m, si) +
      buildStatusBar(m, si) +

      /* Match result summary */
      '<div class="pred-section">' +
        (m.is_dls_applied ? '<div style="margin-bottom:10px;"><span class="dls-badge">🌧 DLS Applied — Revised Target Used</span></div>' : '') +
        '<div class="match-score-display">' +
          '<div class="match-score-team">' +
            '<div class="match-score-name">' + UI.esc(m.team1 || '—') + '</div>' +
            '<div class="match-score-num' + (m.winner === m.team1 ? ' winner-team' : '') + '">' + (m.winner === m.team1 ? '🏆 W' : 'L') + '</div>' +
          '</div>' +
          '<div class="match-score-divider">VS</div>' +
          '<div class="match-score-team">' +
            '<div class="match-score-name">' + UI.esc(m.team2 || '—') + '</div>' +
            '<div class="match-score-num' + (m.winner === m.team2 ? ' winner-team' : '') + '">' + (m.winner === m.team2 ? '🏆 W' : 'L') + '</div>' +
          '</div>' +
        '</div>' +
        (m.actual_target ? '<div style="text-align:center;margin-top:10px;"><span style="font-size:12px;color:var(--text3);">Actual Target: </span><span style="font-family:var(--f-display);font-weight:900;font-size:20px;color:var(--accent);">' + m.actual_target + '</span></div>' : '') +
      '</div>' +

      /* Prediction comparison */
      (pred ?
        '<div class="pred-section">' +
          '<div class="card-title" style="margin-bottom:12px;">Your Prediction</div>' +
          '<div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;">' +
            (diff !== null ? '<div class="accuracy-ring ' + ringCls + '" title="Target diff: ±' + diff + '">' + accuracyLabel(diff) + '</div>' : '') +
            '<div style="flex:1;">' + buildSubmittedBlock(pred, ia, m, pts) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="pred-section" style="text-align:center;">' +
          '<div style="font-size:12px;color:var(--text3);margin-bottom:6px;">Prediction Points Earned</div>' +
          '<div class="pts-earned-chip' + (pts.total === 0 ? ' zero' : '') + '">+' + pts.total + ' pts</div>' +
          (pts.total > 0 ? '<div style="font-size:12px;color:var(--text2);margin-top:8px;">Target: +' + pts.target + ' · Winner: +' + pts.winner + '</div>' : '') +
        '</div>'
      :
        '<div class="pred-section"><div style="color:var(--text3);font-size:13px;text-align:center;">No prediction was submitted for this match.</div></div>'
      ) +

    '</div>'
  );
}

/* ══════════════════════════════════════════════════════════════
   VIEW: ABANDONED
══════════════════════════════════════════════════════════════ */
function renderAbandoned(m, pred, ia) {
  var si = matchStatusInfo(m);
  showArea(
    '<div class="pred-card">' +
      buildMatchHeader(m, si) +
      buildStatusBar(m, si) +
      '<div class="pred-section">' +
        '<div class="abandoned-banner">' +
          '<div class="abandoned-icon">☔</div>' +
          '<div class="abandoned-title">Match Abandoned</div>' +
          '<div class="abandoned-sub">This match was abandoned. No prediction points are awarded.<br>If you activated your Impact Player for this match, that usage does <strong>not</strong> count toward your 8-use limit.</div>' +
        '</div>' +
        (pred ? buildSubmittedBlock(pred, ia, m, { target: 0, winner: 0, total: 0, abandoned: true }) : '') +
      '</div>' +
      '<div class="pred-section" style="text-align:center;">' +
        '<div class="pts-earned-chip abandoned">Match Void — No Points</div>' +
      '</div>' +
    '</div>'
  );
}

/* ══════════════════════════════════════════════════════════════
   SHARED BUILDERS
══════════════════════════════════════════════════════════════ */
function buildMatchHeader(m, si) {
  var t1s = UI.tShort(m.team1), t2s = UI.tShort(m.team2);
  return '<div class="pred-card-header">' +
    '<div>' +
      '<div class="pred-match-name">' + UI.esc(t1s || 'TBD') + ' vs ' + UI.esc(t2s || 'TBD') + '</div>' +
      '<div class="pred-match-meta">' +
        (m.match_no ? 'Match ' + m.match_no + ' · ' : '') +
        UI.fmtDate(m.match_date) +
        (m.venue ? ' · ' + UI.esc(m.venue) : '') +
      '</div>' +
    '</div>' +
    '<span class="match-status status-' + (si.cls === 'open' ? 'open' : si.cls === 'done' ? 'done' : si.cls === 'abandoned' ? 'upcoming' : 'locked') + '">' + si.label + '</span>' +
  '</div>';
}

function buildStatusBar(m, si) {
  return '<div class="pred-status-bar ' + si.cls + '">' +
    (m.is_dls_applied ? '<span class="dls-badge" style="margin-right:6px;">🌧 DLS</span>' : '') +
    si.label +
    (m.status === 'abandoned' ? ' — No points awarded, Impact usage refunded' : '') +
  '</div>';
}

function buildCountdownSection(m) {
  var secs = API.secondsToLock(m);
  if (secs === null || secs <= 0) return '';
  var cdId = 'cd-' + m.id.substring(0, 8);
  // Start ticker
  setTimeout(function() { startCountdown(cdId, m, secs); }, 50);
  var cls = secs < 300 ? 'countdown countdown-urgent' : 'countdown';
  return '<div class="pred-section" style="padding:10px 22px;">' +
    '<div class="deadline-badge' + (secs < 300 ? ' urgent' : '') + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
      'Closes in <span id="' + cdId + '" class="' + cls + '">…</span>' +
    '</div>' +
  '</div>';
}

/** Local countdown that auto-locks the UI when it hits zero. */
function startCountdown(elId, m, initialSecs) {
  if (_cdTimers[elId]) clearInterval(_cdTimers[elId]);
  var secs = initialSecs;
  function tick() {
    var el = document.getElementById(elId);
    if (!el) { clearInterval(_cdTimers[elId]); return; }
    secs = Math.max(0, secs - 1);
    if (secs <= 0) {
      el.textContent = 'Locked';
      el.className = 'countdown countdown-expired';
      clearInterval(_cdTimers[elId]);
      // Refresh the match area to locked state
      setTimeout(function() {
        if (_activeMatchId === m.id) renderMatchArea(m.id);
      }, 500);
      return;
    }
    var h = Math.floor(secs / 3600);
    var min = Math.floor((secs % 3600) / 60);
    var s = secs % 60;
    el.textContent = h > 0
      ? h + 'h ' + String(min).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's'
      : String(min).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
    el.className = secs < 300 ? 'countdown countdown-urgent' : 'countdown';
  }
  tick();
  _cdTimers[elId] = setInterval(tick, 1000);
}

function buildTeamLogo(teamName) {
  var code = UI.tCode(teamName);
  if (!code) return '';
  return '<img src="images/teams/' + code + 'outline.png" style="width:20px;height:20px;object-fit:contain;flex-shrink:0;" onerror="this.style.display=\'none\'">';
}

function buildImpactBanner(m) {
  var impact = _squad.find(function(s) { return s.is_impact; });
  if (!impact) {
    return '<div style="color:var(--text3);font-size:12px;padding:10px;background:var(--bg2);border:1px dashed var(--border);border-radius:8px;text-align:center;">No Impact Player assigned. Admin needs to set one in your squad.</div>';
  }
  var p = impact.player || {};

  // Normalize both to team codes (handles "CSK" vs "CHENNAI SUPER KINGS")
  function toCode(n) { var u = (n || '').toUpperCase(); return UI.TEAM_CODES[u] || u; }
  var pCode = toCode(p.ipl_team);
  var teamPlaying = pCode && (pCode === toCode(m.team1) || pCode === toCode(m.team2));
  var exhausted = (_impactStats.used >= 8) && !_impactActive;
  var disabled = exhausted || !teamPlaying;
  var cls = 'impact-banner' + (_impactActive ? ' active-state' : '') + (exhausted ? ' exhausted' : '') + (!teamPlaying && !exhausted ? ' exhausted' : '');

  return '<div class="' + cls + '">' +
    '<div class="impact-player-row">' +
      imgTag(p.image_url, p.name, '', 'width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;') +
      '<div class="impact-player-info">' +
        '<div class="impact-player-name">' + UI.esc(p.name || '—') + '</div>' +
        '<div class="impact-player-sub">' + UI.esc(p.role || '') + (p.ipl_team ? ' · ' + UI.esc(p.ipl_team) : '') + (p.is_overseas ? ' · ✈️ OS' : '') + '</div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:3px;">' + (exhausted ? '⛔ Limit reached (8/8)' : !teamPlaying ? '⛔ ' + UI.esc(p.ipl_team || 'Team') + ' not playing this match' : _impactActive ? '<span style="color:var(--cyan);font-weight:700;">ACTIVE — 3× multiplier</span>' : 'OFF — excluded from scoring') + '</div>' +
      '</div>' +
      '<div class="impact-multiplier-badge ' + (_impactActive ? 'on' : 'off') + '">' + (_impactActive ? '3×' : '0×') + '</div>' +
    '</div>' +
    (!disabled || _impactActive ?
      '<div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
        '<div style="font-size:12px;color:var(--text2);">Toggle Impact activation for this match</div>' +
        '<label class="switch" onclick="event.stopPropagation()">' +
          '<input type="checkbox" id="impact-chk" ' + (_impactActive ? 'checked' : '') +
          (disabled && !_impactActive ? ' disabled' : '') +
          ' onchange="toggleImpactActivation(this.checked)">' +
          '<span class="slider"></span>' +
        '</label>' +
      '</div>'
    : '') +
  '</div>';
}

function buildSubmittedBlock(pred, ia, m, pts) {
  var impact = _squad.find(function(s) { return s.is_impact; });
  var impactName = impact ? (impact.player && impact.player.name) || 'Assigned' : 'None';
  var diff = (m && m.actual_target != null && pred) ? Math.abs((pred.target_score || 0) - m.actual_target) : null;
  var corW = m && m.winner && pred ? pred.predicted_winner === m.winner : null;
  return '<div class="pred-submitted-block">' +
    '<div class="psb-row"><span class="psb-label">Target Predicted</span>' +
      '<span class="psb-value" style="font-family:var(--f-mono);">' + (pred.target_score || '—') +
        (diff !== null ? ' <span style="font-size:11px;color:' + (diff <= 5 ? 'var(--green)' : 'var(--text3)') + ';">diff ±' + diff + '</span>' : '') +
      '</span>' +
    '</div>' +
    '<div class="psb-row"><span class="psb-label">Winner Predicted</span>' +
      '<span class="psb-value" style="color:' + (corW === true ? 'var(--green)' : corW === false ? 'var(--red)' : 'inherit') + ';">' +
        UI.esc(pred.predicted_winner || '—') + (corW === true ? ' ✓' : corW === false ? ' ✗' : '') +
      '</span>' +
    '</div>' +
    '<div class="psb-row"><span class="psb-label">Impact Player</span>' +
      (ia
        ? '<span class="psb-impact-pill">⚡ ' + UI.esc(impactName) + ' <strong>3× ON</strong></span>'
        : '<span style="color:var(--text3);font-size:13px;">' + UI.esc(impactName) + ' (OFF)</span>') +
    '</div>' +
    (pts.abandoned
      ? '<div class="psb-row"><span class="psb-label">Points</span><span class="pts-earned-chip abandoned" style="font-size:12px;padding:2px 10px;">Void — Match Abandoned</span></div>'
      : (pts.total > 0 ? '<div class="psb-row"><span class="psb-label">Points Earned</span><span class="pts-preview-val" style="font-size:16px;">+' + pts.total + '</span></div>' : '')) +
    (pred.submitted_at
      ? '<div class="psb-row"><span class="psb-label" style="font-size:11px;">Submitted</span><span style="font-size:12px;color:var(--text3);">' + UI.fmtDate(pred.submitted_at) + '</span></div>'
      : '') +
  '</div>';
}

function buildPtsPreview(target, winner) {
  var t = parseInt(target) || null;
  var previewTarget = t ? '— enter target above' : '— enter target above';
  var previewWinner = winner ? '+25' : '— pick winner above';
  return '<div class="pts-preview-row">' +
    '<span class="pts-preview-label">Target accuracy bonus</span>' +
    '<span class="pts-preview-val zero">' + previewTarget + '</span>' +
  '</div>' +
  '<div class="pts-preview-row">' +
    '<span class="pts-preview-label">Correct winner bonus</span>' +
    '<span class="pts-preview-val' + (winner ? '' : ' zero') + '">' + previewWinner + '</span>' +
  '</div>' +
  '<div class="pts-preview-row">' +
    '<span class="pts-preview-label">Max possible prediction pts</span>' +
    '<span class="pts-preview-val">275</span>' +
  '</div>';
}

/* ══════════════════════════════════════════════════════════════
   SELECTION HANDLERS
══════════════════════════════════════════════════════════════ */
function selectWinner(which) {
  var m = _matches.find(function(x) { return x.id === _activeMatchId; });
  if (!m) return;
  _selectedWinner = which === 't1' ? m.team1 : m.team2;
  var b1 = document.getElementById('wbtn-t1');
  var b2 = document.getElementById('wbtn-t2');
  if (b1) b1.classList.toggle('active', which === 't1');
  if (b2) b2.classList.toggle('active', which === 't2');
  updatePtsPreview();
}

function toggleImpactActivation(isActive) {
  if (isActive && _impactStats.used >= 8) {
    UI.toast('Maximum 8 activations reached for the season', 'error');
    var chk = document.getElementById('impact-chk');
    if (chk) chk.checked = false;
    return;
  }
  _impactActive = isActive;
  // Update badge
  var badge = document.querySelector('.impact-multiplier-badge');
  if (badge) { badge.textContent = isActive ? '3×' : '0×'; badge.className = 'impact-multiplier-badge ' + (isActive ? 'on' : 'off'); }
  // Update sub text
  var subs = document.querySelectorAll('.impact-player-sub + div');
  // Update whole banner state
  var banner = document.querySelector('.impact-banner');
  if (banner) { banner.className = 'impact-banner' + (isActive ? ' active-state' : ''); }
}

function updatePtsPreview() {
  var wrap = document.getElementById('pts-preview-wrap');
  if (!wrap) return;
  var t = parseInt((document.getElementById('pred-target') || {}).value) || null;
  var w = _selectedWinner;
  var targetLabel = '— enter target above';
  if (t) {
    var pts = [250, 150, 100, 50, 0];
    var labels = ['Exact (+250)', '±1 (+150)', '±2–5 (+100)', '±6–10 (+50)', 'Miss (+0)'];
    targetLabel = 'Up to +250 pts';
  }
  wrap.innerHTML = buildPtsPreview(t, w);
}

/* ══════════════════════════════════════════════════════════════
   SUBMIT PREDICTION
══════════════════════════════════════════════════════════════ */
async function submitPrediction() {
  if (_submitting) return;
  var errEl = document.getElementById('pred-error');
  if (errEl) errEl.textContent = '';

  var matchObj = _matches.find(function(m) { return m.id === _activeMatchId; });
  if (!matchObj) { if (errEl) errEl.textContent = 'Match not found.'; return; }

  // Re-check open state (might have just locked)
  if (!isPredOpen(matchObj)) {
    if (errEl) errEl.textContent = 'Predictions are now closed for this match.';
    await renderMatchArea(_activeMatchId);
    return;
  }

  var targetInput = document.getElementById('pred-target');
  var target = parseInt(targetInput ? targetInput.value : '');
  if (!target || target < 50 || target > 500) {
    if (errEl) errEl.textContent = 'Enter a valid target score (50–500 runs).';
    return;
  }
  if (!_selectedWinner) {
    if (errEl) errEl.textContent = 'Please select a predicted winner.';
    return;
  }

  // Validate impact (if activating)
  if (_impactActive && _impactStats.used >= 8) {
    if (errEl) errEl.textContent = 'Impact Player limit (8/8) already reached.';
    return;
  }

  var impact = _squad.find(function(s) { return s.is_impact; });
  var impactInfo = _impactActive
    ? ('⚡ Impact: ' + (impact && impact.player ? impact.player.name : 'Assigned') + ' — 3× ACTIVE')
    : 'Impact: OFF (player excluded)';

  UI.showConfirm({
    icon: '🔒',
    title: 'Lock In Prediction?',
    msg: 'Target: ' + target + ' runs\nWinner: ' + _selectedWinner + '\n' + impactInfo,
    consequence: 'Predictions cannot be changed after submission.',
    okLabel: 'Lock In',
    okClass: 'btn-accent',
    onOk: async function() {
      _submitting = true;
      var btn = document.getElementById('submit-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spin"></span> Locking in…'; }

      try {
        // Double-check still open before writing
        var freshMatches = safeArr(await API.fetchMatches({ limit: 40 }));
        _matches = freshMatches;
        var freshMatch = _matches.find(function(m) { return m.id === _activeMatchId; });
        if (!freshMatch || !isPredOpen(freshMatch)) {
          UI.toast('Predictions just closed for this match!', 'error');
          await renderMatchArea(_activeMatchId);
          _submitting = false;
          return;
        }

        await API.submitPrediction({
          matchId:     _activeMatchId,
          teamId:      _myTeamId,
          targetScore: target,
          winner:      _selectedWinner
        }, freshMatch);

        await API.submitImpactActivation(_myTeamId, _activeMatchId, _impactActive);

        UI.toast('Prediction locked' + (_impactActive ? ' with Impact active!' : '!'), 'success');
        await loadImpactStats();
        _impactMatchMap[_activeMatchId] = _impactActive;
        renderUsageMeter();
        renderMatchTabs();
        await renderMatchArea(_activeMatchId);
      } catch(e) {
        var msg = e.message || 'Submission failed. Please try again.';
        if (errEl) errEl.textContent = msg;
        UI.toast(msg, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '🔒 Lock In Prediction'; }
      }
      _submitting = false;
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   SUBMIT IMPACT ONLY (after prediction already submitted)
══════════════════════════════════════════════════════════════ */
async function submitImpactOnly() {
  var impact = _squad.find(function(s) { return s.is_impact; });
  var pName  = (impact && impact.player) ? impact.player.name : 'your Impact Player';

  if (_impactActive && _impactStats.used >= 8) {
    UI.toast('Impact Player limit (8/8) already reached.', 'error');
    return;
  }

  UI.showConfirm({
    icon: _impactActive ? '⚡' : '🛡️',
    title: 'Update Impact Status?',
    msg: _impactActive
      ? 'Activate ' + pName + ' (3× multiplier) for this match?'
      : 'Keep ' + pName + ' OFF for this match?',
    consequence: _impactActive
      ? 'Uses 1 of your 8 season activations.'
      : 'Player will score 0 points for this match.',
    okLabel: 'Confirm',
    okClass: _impactActive ? 'btn-gold' : 'btn-ghost',
    onOk: async function() {
      try {
        await API.submitImpactActivation(_myTeamId, _activeMatchId, _impactActive);
        UI.toast('Impact status updated!', 'success');
        await loadImpactStats();
        _impactMatchMap[_activeMatchId] = _impactActive;
        renderUsageMeter();
        renderMatchTabs();
        await renderMatchArea(_activeMatchId);
      } catch(e) {
        UI.toast('Failed: ' + e.message, 'error');
      }
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════ */
init();
</script>
