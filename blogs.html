<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8f135">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - BFL Blogs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .blog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:20px; }
    .blog-card {
      background:var(--bg1); border:1px solid var(--border); border-radius:var(--radius-lg);
      overflow:hidden; transition:all var(--t); cursor:pointer; animation:fade-up .4s ease both;
      position:relative;
    }
    .blog-card::after { content:''; position:absolute;top:0;left:0;width:40%;height:100%; background:linear-gradient(to right,transparent,rgba(255,255,255,.04),transparent); transform:translateX(-130%)skewX(-15deg); pointer-events:none; }
    .blog-card:hover { border-color:var(--border-h); transform:translateY(-4px); box-shadow:var(--shadow); }
    .blog-card:hover::after { animation:shine .55s ease forwards; }
    .blog-cover { width:100%; height:160px; object-fit:cover; background:linear-gradient(135deg,var(--bg3),var(--bg2)); display:block; }
    .blog-cover-placeholder { width:100%; height:160px; background:linear-gradient(135deg,var(--bg3),var(--bg2)); display:flex; align-items:center; justify-content:center; font-size:42px; }
    .blog-body { padding:18px 18px 16px; }
    .blog-category { display:inline-block; font-family:var(--f-ui); font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:1px; padding:2px 8px; border-radius:4px; margin-bottom:8px; background:var(--accent-dim); color:var(--accent); }
    .blog-title { font-family:var(--f-display); font-weight:400; font-size:18px; line-height:1.3; margin-bottom:8px; }
    .blog-excerpt { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .blog-meta { font-size:12px; color:var(--text3); display:flex; gap:12px; }
    /* Detail view */
    .blog-detail { max-width:740px; margin:0 auto; }
    .blog-detail-title { font-family:var(--f-display); font-weight:600; font-size:36px; line-height:1.2; margin-bottom:14px; }
    .blog-content { font-size:15px; line-height:1.8; color:var(--text2); white-space:pre-wrap; }
    .blog-content p { margin-bottom:14px; }
    /* Editor */
    .editor-wrap textarea { min-height:260px; font-family:var(--f-body); font-size:14px; resize:vertical; }
    .cat-tag { display:inline-block; padding:4px 12px; border-radius:20px; font-family:var(--f-ui); font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); color:var(--text2); background:transparent; transition:all var(--t); margin:2px; }
    .cat-tag:hover,cat-tag.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .cat-tag.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .views-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text3); }
    [data-theme="light"] .blog-card { background:var(--bg2); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
<main class="main">
<div class="container">

  <!-- List view -->
  <div id="view-list">
    <div class="page-header flex-between">
      <div>
        <div class="page-title">BFL Blog</div>
        <div class="page-sub">Match previews · Strategy tips · Announcements</div>
      </div>
      <div style="display:flex;gap:8px;" id="admin-btn-wrap" style="display:none;">
        <button class="btn btn-accent btn-sm" onclick="showEditor()">+ New Post</button>
      </div>
    </div>

    <!-- Category filter -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;" id="cat-filter">
      <button class="cat-tag active" data-cat="" onclick="filterCat(this,'')">All</button>
      <button class="cat-tag" data-cat="preview" onclick="filterCat(this,'preview')">Match Preview</button>
      <button class="cat-tag" data-cat="tips" onclick="filterCat(this,'tips')">Strategy Tips</button>
      <button class="cat-tag" data-cat="announcement" onclick="filterCat(this,'announcement')">Announcements</button>
      <button class="cat-tag" data-cat="recap" onclick="filterCat(this,'recap')">Recaps</button>
    </div>

    <div class="blog-grid" id="blog-grid">
      <div class="skel skel-card" style="height:280px;border-radius:16px;"></div>
      <div class="skel skel-card" style="height:280px;border-radius:16px;"></div>
      <div class="skel skel-card" style="height:280px;border-radius:16px;"></div>
    </div>
    <div id="no-blogs" style="display:none;" class="empty-state mt-24">
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-text">No posts yet — check back soon!</div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="view-detail" style="display:none;">
    <button class="btn btn-ghost btn-sm mb-16" onclick="showList()">← Back to Blog</button>
    <div class="blog-detail" id="detail-wrap"></div>
  </div>

  <!-- Editor (admin only) -->
  <div id="view-editor" style="display:none;">
    <button class="btn btn-ghost btn-sm mb-16" onclick="showList()">← Cancel</button>
    <div class="card" style="max-width:740px;margin:0 auto;">
      <input type="hidden" id="edit-blog-id">
      <div class="card-title" id="editor-title-label">New Post</div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="b-title" placeholder="Post title…">
      </div>
      <div class="form-group">
        <label class="form-label">Excerpt (shown in list)</label>
        <input class="form-input" id="b-excerpt" placeholder="One-line summary…">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="b-category">
          <option value="general">General</option>
          <option value="preview">Match Preview</option>
          <option value="tips">Strategy Tips</option>
          <option value="announcement">Announcement</option>
          <option value="recap">Match Recap</option>
        </select>
      </div>
      <div class="form-group editor-wrap">
        <label class="form-label">Content</label>
        <textarea class="form-input" id="b-content" placeholder="Write your post here…&#10;&#10;Use blank lines to separate paragraphs."></textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="b-published" style="width:16px;height:16px;accent-color:var(--accent);">
          <span style="font-size:14px;color:var(--text2);">Publish immediately</span>
        </label>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-accent" onclick="saveBlog()">Save Post</button>
        <button class="btn btn-danger btn-sm" id="delete-blog-btn" style="display:none;" onclick="deleteBlog()">Delete</button>
        <button class="btn btn-ghost" onclick="showList()">Cancel</button>
      </div>
    </div>
  </div>

</div>
</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _isAdmin = false, _currentCat = '';

async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  _isAdmin = Auth.isAdmin(sess.user);
  await initNavbar('blogs');
  if (_isAdmin) {
    var wrap = document.getElementById('admin-btn-wrap');
    if (wrap) wrap.style.display = 'flex';
  }
  // Check if URL has blog slug
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('slug');
  if (slug) { await showDetail(slug); } else { await loadBlogs(); }
}

async function loadBlogs(category) {
  var grid  = document.getElementById('blog-grid');
  var noEl  = document.getElementById('no-blogs');
  grid.innerHTML = '<div class="skel skel-card" style="height:280px;border-radius:16px;"></div><div class="skel skel-card" style="height:280px;border-radius:16px;"></div>';
  try {
    var blogs = await API.fetchBlogs({ category: category||null, publishedOnly: !_isAdmin });
    if (!blogs.length) {
      grid.innerHTML=''; noEl.style.display=''; return;
    }
    noEl.style.display = 'none';
    var catColors = {preview:'#38d9f5',tips:'#c8f135',announcement:'#f5c842',recap:'#a78bfa',general:'#94a3b8'};
    var catEmojis = {preview:'🏏',tips:'🧠',announcement:'📣',recap:'📊',general:'📝'};
    grid.innerHTML = blogs.map(function(b, i) {
      var col = catColors[b.category]||'#94a3b8';
      return '<div class="blog-card" onclick="showDetail(\''+UI.esc(b.slug||b.id)+'\')" style="animation-delay:'+(.05*i)+'s;">' +
        (b.cover_image ? '<img class="blog-cover" src="'+UI.esc(b.cover_image)+'" alt="" onerror="this.style.display=\'none\'">' :
          '<div class="blog-cover-placeholder" style="font-size:36px;">'+UI.esc(catEmojis[b.category]||'📝')+'</div>') +
        '<div class="blog-body">' +
          '<span class="blog-category" style="background:'+col+'22;color:'+col+';">'+UI.esc(b.category||'general')+'</span>' +
          '<div class="blog-title">'+UI.esc(b.title)+'</div>' +
          (b.excerpt ? '<div class="blog-excerpt">'+UI.esc(b.excerpt)+'</div>' : '') +
          '<div class="blog-meta">' +
            '<span>'+UI.esc(b.author_name||'Admin')+'</span>' +
            '<span>'+UI.shortDate(b.created_at)+'</span>' +
            '<span class="views-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+UI.esc(b.views||0)+'</span>' +
            (!b.is_published&&_isAdmin?'<span style="color:var(--red);font-weight:600;">Draft</span>':'') +
          '</div>' +
        '</div>' +
        (_isAdmin ? '<div style="position:absolute;top:10px;right:10px;display:flex;gap:4px;" onclick="event.stopPropagation()"><button class="btn btn-ghost btn-sm" style="padding:3px 8px;font-size:11px;" onclick="editBlog(\''+UI.esc(b.id)+'\')">Edit</button></div>' : '') +
      '</div>';
    }).join('');
    UI.stagger(grid, 60);
  } catch(e) { UI.toast('Load failed: '+e.message,'error'); }
}

async function showDetail(slugOrId) {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = '';
  document.getElementById('view-editor').style.display = 'none';
  var wrap = document.getElementById('detail-wrap');
  wrap.innerHTML = '<div class="skel skel-h2" style="width:70%;margin-bottom:16px;"></div><div class="skel skel-text"></div><div class="skel skel-text"></div><div class="skel skel-text" style="width:60%;"></div>';
  try {
    var blog = await API.fetchBlog(slugOrId);
    if (!blog) { wrap.innerHTML='<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-text">Post not found</div></div>'; return; }
    var catColors = {preview:'#38d9f5',tips:'#c8f135',announcement:'#f5c842',recap:'#a78bfa',general:'#94a3b8'};
    var col = catColors[blog.category]||'#94a3b8';
    wrap.innerHTML =
      '<span class="blog-category" style="background:'+col+'22;color:'+col+';">'+UI.esc(blog.category||'general')+'</span>' +
      '<h1 class="blog-detail-title mt-8">'+UI.esc(blog.title)+'</h1>' +
      '<div class="blog-meta mb-24"><span>'+UI.esc(blog.author_name||'Admin')+'</span><span>'+UI.fmtDate(blog.created_at)+'</span><span class="views-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+UI.esc(blog.views||0)+'</span></div>' +
      (blog.cover_image ? '<img src="'+UI.esc(blog.cover_image)+'" style="width:100%;border-radius:12px;margin-bottom:24px;object-fit:cover;max-height:380px;" onerror="this.style.display=\'none\'">' : '') +
      '<div class="blog-content">'+UI.esc(blog.content)+'</div>' +
      (_isAdmin ? '<div style="margin-top:24px;padding-top:18px;border-top:1px solid var(--border);display:flex;gap:8px;"><button class="btn btn-ghost btn-sm" onclick="editBlog(\''+UI.esc(blog.id)+'\')">Edit Post</button></div>' : '');
    window.history.replaceState(null,'','?slug='+(blog.slug||blog.id));
  } catch(e) { wrap.innerHTML='<div class="empty-state"><div class="empty-state-text">'+UI.esc(e.message)+'</div></div>'; }
}

function showList() {
  document.getElementById('view-list').style.display   = '';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-editor').style.display = 'none';
  window.history.replaceState(null,'','blogs.html');
  loadBlogs(_currentCat||undefined);
}

function showEditor(blog) {
  document.getElementById('view-list').style.display   = 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-editor').style.display = '';
  document.getElementById('edit-blog-id').value = blog ? blog.id : '';
  document.getElementById('b-title').value      = blog ? blog.title : '';
  document.getElementById('b-excerpt').value    = blog ? (blog.excerpt||'') : '';
  document.getElementById('b-category').value   = blog ? (blog.category||'general') : 'general';
  document.getElementById('b-content').value    = blog ? blog.content : '';
  document.getElementById('b-published').checked= blog ? !!blog.is_published : false;
  var delBtn = document.getElementById('delete-blog-btn');
  if (delBtn) delBtn.style.display = blog ? '' : 'none';
  document.getElementById('editor-title-label').textContent = blog ? 'Edit Post' : 'New Post';
}

async function editBlog(blogId) {
  try {
    var blog = await API.fetchBlog(blogId);
    if (blog) showEditor(blog);
  } catch(e) { UI.toast('Load failed: '+e.message,'error'); }
}

async function saveBlog() {
  var id    = document.getElementById('edit-blog-id').value;
  var title = document.getElementById('b-title').value.trim();
  var content=document.getElementById('b-content').value.trim();
  if (!title||!content) { UI.toast('Title and content are required','warn'); return; }
  var blog = {
    title, content,
    excerpt:     document.getElementById('b-excerpt').value.trim()||null,
    category:    document.getElementById('b-category').value,
    is_published:document.getElementById('b-published').checked,
  };
  if (id) blog.id = id;
  try {
    await API.upsertBlog(blog);
    UI.toast('Post saved!','success');
    showList();
  } catch(e) { UI.toast('Save failed: '+e.message,'error'); }
}

async function deleteBlog() {
  var id = document.getElementById('edit-blog-id').value;
  if (!id) return;
  if (!confirm('Delete this post permanently?')) return;
  try {
    await API.deleteBlog(id);
    UI.toast('Post deleted','warn');
    showList();
  } catch(e) { UI.toast('Delete failed: '+e.message,'error'); }
}

function filterCat(btn, cat) {
  _currentCat = cat;
  document.querySelectorAll('.cat-tag').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  loadBlogs(cat||undefined);
}

init();
</script>
</div>
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="footer-content">
    <div class="footer-logos">
      <img src="images\bfl\bfl-logo.png" alt="BFL Logo" class="footer-logo footer-logo-bfl">
      <img src="images\ipl\ipl-logo.png" alt="IPL Logo" class="footer-logo footer-logo-t20">
    </div>
    <p class="footer-copy">Copyright 2026 BFL. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
