<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/bfl/bfl-logo.png">
  <meta name="theme-color" content="#c8f135">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - BFL Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .clickable-row { cursor:pointer; transition:background var(--t); }
    .clickable-row:hover { background:var(--bg3); }
    .clickable-row:active { background:var(--bg2); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
<main class="main" style="position:relative;z-index:1;">
<div class="container">

  <div class="page-header flex-between">
    <div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px;" id="welcome-date">—</div>
      <div class="page-title" id="welcome-title">Loading…</div>
    </div>
    <div id="rank-chip" style="display:none;">
      <div style="background:var(--gold-dim);border:1px solid rgba(245,200,66,.25);border-radius:12px;padding:12px 20px;text-align:center;">
        <div style="font-family:var(--f-display);font-size:28px;font-weight:600;color:var(--gold);" id="rank-val">—</div>
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Current Rank</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid mb-24" id="stat-grid">
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
  </div>

  <!-- Main grid -->
  <div id="main-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

    <!-- LEFT col -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Next match with countdown -->
      <div class="card" id="next-match-card">
        <div class="card-title">Next Match</div>
        <div class="skel skel-card" style="height:130px;"></div>
      </div>

      <!-- Badges earned -->
      <div class="card">
        <div class="flex-between mb-16">
          <div class="card-title" style="margin:0;">Badges</div>
          <a href="analytics.html#badges" class="btn btn-ghost btn-sm">View All</a>
        </div>
        <div id="badges-preview" style="display:flex;flex-wrap:wrap;gap:8px;">
          <div class="skel" style="width:48px;height:48px;border-radius:10px;"></div>
          <div class="skel" style="width:48px;height:48px;border-radius:10px;"></div>
        </div>
      </div>

      <!-- Impact usage -->
      <div class="card">
        <div class="flex-between mb-8">
          <div class="card-title" style="margin:0;">Impact Player Uses</div>
          <a href="predictions.html" class="btn btn-ghost btn-sm">Use Now</a>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div>
            <div style="font-family:var(--f-display);font-weight:600;font-size:34px;" id="impact-left">—</div>
            <div style="font-size:12px;color:var(--text2);">remaining</div>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;max-width:150px;" id="impact-pips"></div>
        </div>
      </div>

    </div>

    <!-- RIGHT col -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Recent matches -->
      <div class="card" style="flex:1;">
        <div class="flex-between mb-16">
          <div class="card-title" style="margin:0;">Recent Results</div>
          <a href="leaderboard.html" class="btn btn-ghost btn-sm">Full Standings</a>
        </div>
        <div id="history-wrap">
          <div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>
        </div>
      </div>

      <!-- Latest blog post -->
      <div class="card" id="latest-blog-card">
        <div class="card-title">Latest from Blog</div>
        <div class="skel skel-row"></div>
      </div>

    </div>
  </div>

  <!-- Mini leaderboard -->
  <div class="card mt-24">
    <div class="flex-between mb-16">
      <div class="card-title" style="margin:0;">Top 5 Teams</div>
      <a href="leaderboard.html" class="btn btn-ghost btn-sm">View All</a>
    </div>
    <div id="mini-lb-wrap">
      <div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>
    </div>
  </div>

</div>
</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _myTeam=null, _myTeamId=null, _matchLogs=[];

async function init() {
  var sess=await Auth.requireAuth(); if(!sess) return;
  if(Auth.isAdmin(sess.user)){window.location.href='admin.html';return;}
  await initNavbar('dashboard');
  _myTeam=await Auth.fetchTeam(sess.user.id);
  if(!_myTeam){UI.toast('Team not linked. Contact admin.','error');return;}
  _myTeamId=_myTeam.id;
  document.getElementById('welcome-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('welcome-title').textContent='Welcome, '+_myTeam.team_name+' 👋';
  await Promise.all([loadStats(),loadNextMatch(),loadImpactUsage(),loadHistory(),loadMiniLB(),loadBadgesPreview(),loadLatestBlog()]);
  await API.checkAndAwardBadges(_myTeamId);
  fixGrid();
}

async function loadStats() {
  try {
    var [lb,breakdown]=await Promise.all([API.fetchLeaderboard(),API.fetchPointsBreakdown(_myTeamId)]);
    var myRow=lb.find(function(r){return r.fantasy_team_id===_myTeamId;});
    var rank=myRow?myRow.rank:null, total=myRow?myRow.total_points:0, played=myRow?myRow.matches_played:0;
    var avg=played?(total/played).toFixed(1):'—';
    if(rank){document.getElementById('rank-chip').style.display='';UI.el('rank-val').textContent=UI.ordinal(rank);}
    var grid=document.getElementById('stat-grid');
    grid.innerHTML=
      '<div class="stat-chip" style="animation-delay:0s"><div class="stat-chip-val" id="chip-pts">0</div><div class="stat-chip-lbl">Total Points</div></div>'+
      '<div class="stat-chip gold" style="animation-delay:.07s"><div class="stat-chip-val" style="color:var(--gold);">'+(rank?UI.ordinal(rank):'—')+'</div><div class="stat-chip-lbl">Rank</div></div>'+
      '<div class="stat-chip cyan" style="animation-delay:.14s"><div class="stat-chip-val" style="color:var(--cyan);">'+played+'</div><div class="stat-chip-lbl">Matches</div></div>'+
      '<div class="stat-chip" style="animation-delay:.21s"><div class="stat-chip-val">'+avg+'</div><div class="stat-chip-lbl">Avg / Match</div></div>';
    UI.countUp(document.getElementById('chip-pts'),total,1200);
  } catch(e){}
}

async function loadNextMatch() {
  var card=document.getElementById('next-match-card');
  try {
    var matches=await API.fetchMatches({upcoming:true,limit:1});
    var m=matches[0];
    if(!m){card.innerHTML='<div class="card-title">Next Match</div><div class="empty-state" style="padding:24px;"><div class="empty-state-text">No upcoming matches</div></div>';return;}
    var pred=await API.fetchPrediction(m.id,_myTeamId);
    var isOpen=API.isMatchOpen(m);
    var deadlineBadge=isOpen?('<div class="deadline-badge'+(API.secondsToDeadline(m)<300?' urgent':'')+'" style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Closes <span class="countdown" id="next-match-cd">…</span></div>'):'<span class="match-status status-locked">🔒 Predictions Locked</span>';
    card.innerHTML=
      '<div class="flex-between mb-8"><div class="card-title" style="margin:0;">Next Match</div><span class="match-status '+(pred?'status-done':'status-open')+'">'+(pred?'✓ Predicted':'Open')+'</span></div>'+
      '<div class="match-teams mb-8"><div class="match-team">'+UI.esc(m.team1)+'</div><div class="match-vs">VS</div><div class="match-team">'+UI.esc(m.team2)+'</div></div>'+
      '<div class="match-meta">'+
        (m.match_date?'<span>📅 '+UI.fmtDate(m.match_date)+'</span>':'')+
        (m.venue?'<span>📍 '+UI.esc(m.venue)+'</span>':'')+
      '</div>'+
      deadlineBadge+
      '<a href="predictions.html" class="btn '+(pred?'btn-ghost':'btn-accent')+' btn-full btn-sm" style="margin-top:12px;">'+(pred?'View Prediction':'Make Prediction →')+'</a>';
    if(isOpen&&m.deadline_time) UI.startCountdown('next-match-cd',m.deadline_time);
  } catch(e){card.innerHTML='<div class="card-title">Next Match</div><div style="color:var(--text3);font-size:13px;">Could not load.</div>';}
}

async function loadImpactUsage() {
  try {
    var stats=await API.fetchImpactStats(_myTeamId);
    var count=stats.used;
    var left=Math.max(0,8-count);
    var el=document.getElementById('impact-left');
    if(el){el.textContent=left;el.style.color=left===0?'var(--red)':left<=2?'#f59e0b':'var(--accent)';}
    var pips='';
    for(var i=0;i<8;i++) pips+='<div title="'+(i<count?'Used':'Available')+'" style="width:16px;height:16px;border-radius:50%;background:'+(i<count?'var(--accent)':'var(--bg3)')+';border:1px solid '+(i<count?'var(--accent)':'var(--border)')+';transition:all var(--t);cursor:default;" onmouseover="this.style.transform=\'scale(1.2)\'" onmouseout="this.style.transform=\'\'"></div>';
    document.getElementById('impact-pips').innerHTML=pips;
  } catch(e){}
}

async function loadBadgesPreview() {
  try {
    var badges=await API.fetchUserBadges(_myTeamId);
    var el=document.getElementById('badges-preview');
    if(!badges.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;">No badges yet — keep playing!</div>';return;}
    el.innerHTML=badges.slice(0,6).map(function(b){
      return '<div title="'+UI.esc(b.badge?.name||'')+'" style="width:48px;height:48px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:default;transition:all var(--t);" onmouseover="this.style.transform=\'scale(1.15) rotate(-5deg)\';this.style.borderColor=\''+UI.esc(b.badge?.color||'var(--accent)')+'\'" onmouseout="this.style.transform=\'\';this.style.borderColor=\'var(--border)\'">'+UI.esc(b.badge?.icon||'🏅')+'</div>';
    }).join('');
  } catch(e){}
}

async function loadHistory() {
  var wrap=document.getElementById('history-wrap');
  try {
    var logs=await API.fetchPointsBreakdown(_myTeamId);
    _matchLogs=logs;
    if(!logs.length){wrap.innerHTML='<div style="text-align:center;color:var(--text3);padding:24px;font-size:14px;">No match results yet</div>';return;}
    wrap.innerHTML='<div class="table-wrap"><table class="data-table"><thead><tr><th>Match</th><th>Squad</th><th>Pred</th><th>Total</th></tr></thead><tbody>'+
      logs.slice().reverse().slice(0,6).map(function(l){
        return '<tr class="clickable-row" onclick="showMatchBreakdown(\''+l.id+'\')"><td style="font-weight:400;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+UI.esc(l.match?(l.match.match_title||l.match.team1+' vs '+l.match.team2):'—')+'</td><td class="font-mono">'+l.squad_points+'</td><td class="font-mono">'+l.prediction_points+'</td><td class="pts">'+l.total_points+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  } catch(e){wrap.innerHTML='<div style="color:var(--text3);font-size:13px;">Could not load history.</div>';}
}

function showMatchBreakdown(logId) {
  var log=_matchLogs.find(function(l){return l.id===logId;});
  if(!log || !log.breakdown || !log.breakdown.players) { UI.toast('No breakdown data available','warn'); return; }
  
  var players=log.breakdown.players;
  var html='<div class="table-wrap" style="margin:-10px 0;"><table class="data-table" style="font-size:13px;"><thead><tr><th>Player</th><th>Role</th><th>Multi</th><th>Pts</th></tr></thead><tbody>';
  
  players.forEach(function(p){
    var roleLabel=p.isCaptain?'(C)':p.isVC?'(VC)':p.isImpact?'(IP)':'';
    var multi=p.multiplier?(p.multiplier+'x'):'—';
    var nameStyle=p.isImpact||p.isCaptain||p.isVC?'font-weight:600;color:var(--text)':'';
    html+='<tr>'+
      '<td><div style="'+nameStyle+'">'+UI.esc(p.name)+'</div><div style="font-size:10px;color:var(--text3);">'+UI.esc(p.ipl_team||'—')+'</div></td>'+
      '<td><span style="font-size:11px;font-weight:600;color:var(--text2);">'+UI.esc(p.role?p.role.substring(0,3).toUpperCase():'—')+' <span style="color:var(--accent);">'+roleLabel+'</span></span></td>'+
      '<td class="font-mono">'+multi+'</td>'+
      '<td class="font-mono" style="font-weight:600;color:var(--accent);">'+(p.final||p.points||0)+'</td>'+
    '</tr>';
  });
  
  html+='</tbody></table></div>';
  html+='<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
    '<div style="font-size:12px;color:var(--text3);">Prediction Bonus: <span style="color:var(--text2);font-weight:600;">+'+(log.prediction_points||0)+'</span></div>'+
    '<div style="font-size:16px;font-weight:600;">Total: <span style="color:var(--accent);">'+log.total_points+'</span></div>'+
  '</div>';

  UI.showModal({
    title: log.match?(log.match.match_title||log.match.team1+' vs '+log.match.team2):'Match Breakdown',
    content: html
  });
}

async function loadMiniLB() {
  var wrap=document.getElementById('mini-lb-wrap');
  try {
    var lb=await API.fetchLeaderboard();
    if(!lb.length){wrap.innerHTML='<div style="color:var(--text3);font-size:13px;">No data yet.</div>';return;}
    var medals={1:'🥇',2:'🥈',3:'🥉'};
    wrap.innerHTML='<div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>Team</th><th>Played</th><th>Points</th></tr></thead><tbody>'+
      lb.slice(0,5).map(function(r){
        var isMe=r.fantasy_team_id===_myTeamId;
        return '<tr'+(isMe?' class="highlight-me"':'')+'>'+
          '<td class="rank">'+(medals[r.rank]||r.rank)+'</td>'+
          '<td style="font-weight:600;">'+UI.esc(r.team?r.team.team_name:'—')+(isMe?' <span class="badge badge-accent" style="font-size:10px;">You</span>':'')+'</td>'+
          '<td style="color:var(--text2);">'+r.matches_played+'</td>'+
          '<td class="pts">'+r.total_points+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  } catch(e){}
}

async function loadLatestBlog() {
  var card=document.getElementById('latest-blog-card');
  try {
    var blogs=await API.fetchBlogs({limit:1,publishedOnly:true});
    var b=blogs[0];
    if(!b){card.innerHTML='<div class="card-title">Latest from Blog</div><div style="color:var(--text3);font-size:13px;">No posts yet.</div>';return;}
    card.innerHTML='<div class="card-title">Latest from Blog</div>'+
      '<div style="cursor:pointer;" onclick="window.location.href=\'blogs.html?slug='+UI.esc(b.slug||b.id)+'\'">'+
        '<div style="font-family:var(--f-display);font-weight:400;font-size:16px;margin-bottom:6px;transition:color var(--t);" onmouseover="this.style.color=\'var(--accent)\'" onmouseout="this.style.color=\'\'">'+UI.esc(b.title)+'</div>'+
        '<div style="font-size:12px;color:var(--text2);">'+UI.esc(b.excerpt||'')+'</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:6px;">'+UI.shortDate(b.created_at)+' · '+UI.esc(b.category||'general')+'</div>'+
      '</div>';
  } catch(e){}
}

function fixGrid() {
  var g=document.getElementById('main-grid');
  if(g) g.style.gridTemplateColumns=window.innerWidth<700?'1fr':'1fr 1fr';
}
window.addEventListener('resize',fixGrid);
init();
</script>
</div>
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="footer-content">
    <div class="footer-logos">
      <img src="images\bfl\bfl-logo.png" alt="BFL Logo" class="footer-logo footer-logo-bfl">
      <img src="images\ipl\ipl-logo.png" alt="IPL Logo" class="footer-logo footer-logo-t20">
    </div>
    <p class="footer-copy">Copyright 2026 BFL. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
