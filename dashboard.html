<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/bfl/bfl-logo.png">
  <meta name="theme-color" content="#f0b429">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 — BFL Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .clickable-row { cursor:pointer; transition:background var(--t); }
    .clickable-row:hover { background:var(--bg3); }
    .widget-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:22px; }
    .widget-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:16px; position:relative; overflow:hidden; cursor:default;
      transition:all var(--t); animation:fade-up .4s ease both;
      text-align:center;
    }
    .widget-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--wc,var(--accent)); }
    .widget-card:hover { border-color:var(--border-h); transform:translateY(-3px); box-shadow:var(--shadow); }
    .widget-val { font-family:var(--f-display); font-weight:900; font-size:30px; color:var(--wc,var(--accent)); line-height:1; margin-bottom:5px; }
    .widget-lbl { font-family:var(--f-ui); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text3); }
    .widget-sub { font-size:11px; color:var(--text2); margin-top:4px; }
    .hero-banner {
      background: url('images/ipl/rounded_spiral-latest-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border:0px solid var(--border); border-radius:var(--radius-xl);
      padding:24px 28px; display:flex; align-items:center; justify-content:space-between;
      gap:20px; flex-wrap:wrap; margin-bottom:22px; position:relative; overflow:hidden;
      animation:fade-up .4s ease both;
    }
    .hero-banner::before { content:''; position:absolute; inset:0; background:rgba(17,26,46,0.8); border-radius:inherit; z-index:1; }
    
    .hero-banner > * { position:relative; z-index:1; }
    .hero-rank-chip { background:var(--gold-dim); border:1px solid rgba(245,200,66,.3); border-radius:14px; padding:14px 22px; text-align:center; flex-shrink:0; position:relative; z-index:1; }
    .hero-rank-chip .trophy-icon { width:28px; height:auto; display:block; margin:0 auto 4px; opacity:.9; }
    .hero-greeting { font-size:13px; color:var(--text2); margin-bottom:4px; }
    .hero-name { font-family:var(--f-display); font-weight:900; font-size:28px; letter-spacing:.3px; }
    .hero-rank-chip { background:var(--gold-dim); border:1px solid rgba(245,200,66,.3); border-radius:14px; padding:14px 22px; text-align:center; flex-shrink:0; }
    .hero-rank-val { font-family:var(--f-display); font-size:32px; font-weight:900; color:var(--gold); line-height:1; }
    .hero-rank-lbl { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; font-family:var(--f-ui); font-weight:700; margin-top:2px; }
    .next-match-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; animation:fade-up .4s ease .1s both; }
    .main-2col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .performer-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .performer-row:last-child { border-bottom:none; }
    .performer-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; background:var(--bg3); flex-shrink:0; border:2px solid var(--border); }
    .performer-info { flex:1; }
    .performer-name { font-family:var(--f-ui); font-weight:700; font-size:13px; }
    .performer-sub { font-size:11px; color:var(--text2); }
    .performer-pts { font-family:var(--f-display); font-weight:900; font-size:18px; color:var(--accent); }
    @media(max-width:700px) {
      .main-2col { grid-template-columns:1fr; }
      .hero-banner { 
        padding:18px;
        background: url('images/ipl/rounded_spiral-latest-bg.png');
        background-size: cover;
        background-position: center right;
        background-repeat: no-repeat;
      }
      .hero-banner::before { background:linear-gradient(135deg, rgba(17,26,46,0.8) 0%, rgba(17,26,46,0.8) 100%); }
      .widget-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .widget-val { font-size:clamp(22px, 8vw, 30px); }
    }
    @media(max-width:420px) {
      .hero-name { font-size:clamp(20px, 7vw, 28px); }
      .hero-rank-val { font-size:clamp(24px, 9vw, 32px); }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<!-- Sponsor Corner Decorations -->
<img src="images/ipl/sponsor-top-left.png" class="sponsor-corner sponsor-top-left" alt="">
<img src="images/ipl/sponsor-top-right.png" class="sponsor-corner sponsor-top-right" alt="">
<img src="images/ipl/sponsor-bottom-left.png" class="sponsor-corner sponsor-bottom-left" alt="">
<img src="images/ipl/sponsor-bottom-right.png" class="sponsor-corner sponsor-bottom-right" alt="">

<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
<main class="main" style="position:relative;z-index:1;">
<div class="container">

  <!-- Hero Banner -->
  <div class="hero-banner" id="hero-banner">
    <div>
      <div class="hero-greeting" id="hero-greeting">Good evening · <span id="hero-date">—</span></div>
      <div class="hero-name" id="hero-name">Loading…</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;" id="hero-badges">
        <div class="skel" style="width:80px;height:22px;border-radius:20px;"></div>
      </div>
    </div>
    <div class="hero-rank-chip" id="hero-rank-chip" style="display:none;">
      <div class="hero-rank-val" id="hero-rank-val">—</div>
      <div class="hero-rank-lbl">Current Rank</div>
    </div>
  </div>

  <!-- Key Stats -->
  <div class="widget-grid" id="stat-widgets">
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
  </div>

  <div class="main-2col">
    <!-- Left column -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Next match -->
      <div class="next-match-card" id="next-match-card">
        <div class="card-title">Next Match</div>
        <div class="skel skel-card" style="height:110px;"></div>
      </div>

      <!-- Performance widgets -->
      <div class="card">
        <div class="flex-between mb-12">
          <div class="card-title">This Season</div>
          <a href="analytics.html" class="btn btn-ghost btn-sm">Analytics →</a>
        </div>
        <div id="season-stats-wrap">
          <div class="skel skel-row"></div><div class="skel skel-row"></div>
        </div>
      </div>

      <!-- Impact usage -->
      <div class="card">
        <div class="flex-between mb-8">
          <div class="card-title">Impact Uses</div>
          <a href="predictions.html" class="btn btn-ghost btn-sm">Use Now →</a>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div>
            <div style="font-family:var(--f-display);font-weight:900;font-size:38px;line-height:1;" id="impact-remaining">—</div>
            <div style="font-size:12px;color:var(--text2);">remaining of 8</div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;" id="impact-pips"></div>
        </div>
      </div>

    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Top & worst performer -->
      <div class="card">
        <div class="flex-between mb-12">
          <div class="card-title">Player Spotlight</div>
          <a href="squad.html" class="btn btn-ghost btn-sm">Full Squad →</a>
        </div>
        <div id="performer-list"><div class="skel skel-row"></div><div class="skel skel-row"></div></div>
      </div>

      <!-- Recent match results -->
      <div class="card" style="flex:1;">
        <div class="flex-between mb-12">
          <div class="card-title">Recent Results</div>
          <a href="leaderboard.html" class="btn btn-ghost btn-sm">Standings →</a>
        </div>
        <div id="recent-results"><div class="skel skel-row"></div><div class="skel skel-row"></div></div>
      </div>
  </div>

  <!-- Mini leaderboard -->
  <div class="card mt-24">
    <div class="flex-between mb-16">
      <div class="card-title">Top 5 Teams</div>
      <a href="leaderboard.html" class="btn btn-ghost btn-sm">View All →</a>
    </div>
    <div id="mini-leaderboard"><div class="skel skel-row"></div><div class="skel skel-row"></div></div>
  </div>

</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _myTeam=null, _myTeamId=null, _matchLogs=[];

async function init() {
  var sess = await Auth.requireAuth(); if(!sess) return;
  if(Auth.isAdmin(sess.user)) { window.location.href='admin.html'; return; }
  await initNavbar('dashboard');
  _myTeam = await Auth.fetchTeam(sess.user.id);
  if(!_myTeam) { UI.toast('Team not linked. Contact admin.','error'); return; }
  _myTeamId = _myTeam.id;

  // Update last_active on login and start polling
  try {
    await API.updateTeamLastActive(_myTeamId);
  } catch(e) { console.warn('[last_active]', e); }
  API.startActivePolling(_myTeamId, 60000);

  var now = new Date();
  var hr = now.getHours();
  var greet = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  document.getElementById('hero-greeting').innerHTML = greet + ' · <span id="hero-date">'+now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})+'</span>';
  document.getElementById('hero-name').innerHTML = 'Welcome Back, ' + UI.championName(_myTeam.team_name) + ' 👋🏻';

  await Promise.all([loadStats(), loadNextMatch(), loadImpact(), loadPerformers(), loadRecent(), loadMiniLB()]);
  await API.checkAndAwardBadges(_myTeamId);
}

async function loadStats() {
  try {
    var [lb, breakdown] = await Promise.all([API.fetchLeaderboard(), API.fetchPointsBreakdown(_myTeamId)]);
    var myRow = lb.find(function(r){return r.fantasy_team_id===_myTeamId;});
    var total=myRow?myRow.total_points:0, rank=myRow?myRow.rank:null;
    var played=myRow&&myRow.matches_played?myRow.matches_played:breakdown.length;
    var avg = played ? (total/played).toFixed(1) : '—';
    var lastMatch = breakdown.length ? breakdown[breakdown.length-1] : null;
    var lastPts = lastMatch ? UI.fmtPts(lastMatch.total_points) : '—';

    // Rank chip
    if(rank){ 
      var rc=$('#hero-rank-chip'); 
      rc.style.display=''; 
      var trophyHtml = rank === 1 ? '<img src="images/ipl/team-trophy-small.png" alt="Champion" class="trophy-icon">' : '';
      $('#hero-rank-val').innerHTML = trophyHtml + UI.ordinal(rank) + '<div style="margin-top:4px;">' + UI.rankBadge(rank, myRow.prev_rank) + '</div>';
    }

    // Badges
    var badges = '';
    if(rank===1) badges+='<span class="badge badge-gold">🥇 Leader</span> ';
    if(played>0) badges+='<span class="badge badge-accent">'+played+' matches</span> ';
    $('#hero-badges').innerHTML = badges || '<span style="font-size:12px;color:var(--text3);">Season just started!</span>';

    var widgets = [
      { val:UI.fmtPts(total), lbl:'Season Points', sub:'All matches combined', c:'var(--accent)', anim:true },
      { val:rank?UI.ordinal(rank):'—', lbl:'Current Rank', sub:'Out of '+lb.length+' teams', c:'var(--gold)' },
      { val:lastPts, lbl:'Last Match', sub:lastMatch&&lastMatch.match?('Match No.'+(lastMatch.match.match_no||'?')+' '+(UI.tShort(lastMatch.match.team1))+' vs '+(UI.tShort(lastMatch.match.team2))):'' , c:'var(--cyan)' },
      { val:UI.fmtPts(avg), lbl:'Avg / Match', sub:'Points per game', c:'var(--purple)' },
    ];
    $('#stat-widgets').innerHTML = widgets.map(function(w,i){
      return '<div class="widget-card" style="--wc:'+w.c+';animation-delay:'+(i*.08)+'s">'+
        '<div class="widget-val" id="wval-'+i+'">'+(w.anim?0:w.val)+'</div>'+
        '<div class="widget-lbl">'+w.lbl+'</div>'+
        (w.sub?'<div class="widget-sub">'+UI.esc(w.sub)+'</div>':'')+
      '</div>';
    }).join('');
    if(widgets[0].anim) UI.countUp($('#wval-0'), total, 1200, total%1!==0);

    // Season stats
    _matchLogs = breakdown;
    var batTotal=0,bowlTotal=0,fldTotal=0,predTotal=0;
    breakdown.forEach(function(l){batTotal+=(l.batting_pts||0);bowlTotal+=(l.bowling_pts||0);fldTotal+=(l.fielding_pts||0);predTotal+=(l.prediction_points||0);});
    var rows=[
      {lbl:'🏏 Batting',val:batTotal,c:'#f87171'},
      {lbl:'🎳 Bowling',val:bowlTotal,c:'#60a5fa'},
      {lbl:'🧤 Fielding',val:fldTotal,c:'#34d399'},
      {lbl:'🎯 Predictions',val:predTotal,c:'var(--gold)'},
    ];
    var maxV = Math.max(batTotal,bowlTotal,fldTotal,predTotal,1);
    $('#season-stats-wrap').innerHTML = rows.map(function(r){
      return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'+
        '<div style="min-width:110px;font-size:12px;color:var(--text2);">'+r.lbl+'</div>'+
        '<div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;">'+
          '<div style="height:100%;background:'+r.c+';width:'+Math.round((r.val/maxV)*100)+'%;border-radius:3px;transition:width 1s ease;"></div>'+
        '</div>'+
        '<div style="min-width:40px;text-align:right;font-family:var(--f-mono);font-size:12px;font-weight:700;">'+UI.fmtPts(r.val)+'</div>'+
      '</div>';
    }).join('');
  } catch(e) { UI.toast('Could not load stats','error'); }
}

async function loadNextMatch() {
  var card = $('#next-match-card');
  try {
    var matches = await API.fetchMatches({upcoming:true, limit:1});
    var m = matches[0];
    if(!m) { card.innerHTML='<div class="card-title">Next Match</div><div class="empty-state" style="padding:20px;"><div class="empty-state-text">No upcoming matches</div></div>'; return; }
    var pred = await API.fetchPrediction(m.id, _myTeamId);
    var isOpen = API.isMatchOpen(m);
    var cdId = 'next-cd';
    var deadline_badge = isOpen
      ? '<div class="deadline-badge'+(API.secondsToDeadline(m)<300?' urgent':'')+'" style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Closes <span class="countdown" id="'+cdId+'">…</span></div>'
      : '<span class="match-status status-locked" style="margin-top:8px;display:inline-block;">🔒 Predictions Locked</span>';
    card.innerHTML =
      '<div class="flex-between mb-8"><div class="card-title">Next Match</div><span class="match-status '+(pred?'status-done':'status-open')+'">'+(pred?'✓ Predicted':'Open')+'</span></div>'+
      '<div class="match-teams mb-6"><div class="match-team">'+UI.esc(m.team1)+'</div><div class="match-vs">VS</div><div class="match-team">'+UI.esc(m.team2)+'</div></div>'+
      '<div class="match-meta">'+(m.match_date?'<span>📅 '+UI.fmtDate(m.match_date)+'</span>':'')+(m.venue?'<span>📍 '+UI.esc(m.venue)+'</span>':'')+'</div>'+
      deadline_badge+
      '<a href="predictions.html" class="btn '+(pred?'btn-ghost':'btn-accent')+' btn-sm btn-full" style="margin-top:12px;">'+(pred?'View Prediction':'Make Prediction →')+'</a>';
    if(isOpen && m.deadline_time) UI.startCountdown(cdId, m.deadline_time);
  } catch(e) { card.innerHTML='<div class="card-title">Next Match</div><div style="color:var(--text3);font-size:13px;">Could not load.</div>'; }
}

async function loadImpact() {
  try {
    var stats = await API.fetchImpactStats(_myTeamId);
    var used = stats.uses !== undefined ? stats.uses : (stats.used || 0);
    var left = Math.max(0, 8 - used);
    var el = $('#impact-remaining');
    if(el){ el.textContent=left; el.style.color=left===0?'var(--red)':left<=2?'var(--gold)':'var(--accent)'; }
    var pips='';
    for(var i=0;i<8;i++) pips+='<div title="'+(i<used?'Used':'Available')+'" style="width:16px;height:16px;border-radius:50%;background:'+(i<used?'var(--accent)':'var(--bg3)')+';border:1px solid '+(i<used?'var(--accent)':'var(--border)')+';transition:all var(--t);"></div>';
    $('#impact-pips').innerHTML = pips;
  } catch(e) { UI.toast('Could not load impact stats','error'); }
}

async function loadPerformers() {
  try {
    var breakdown = await API.fetchPointsBreakdown(_myTeamId);
    var squad = await API.fetchSquad(_myTeamId);
    var playerTeamMap = {};
    squad.forEach(function(s){
      if(s.player&&s.player.name) playerTeamMap[s.player.name]=s.player.ipl_team;
    });
    var pts = {};
    breakdown.forEach(function(l){
      (l.breakdown&&l.breakdown.players||[]).forEach(function(p){
        if(!pts[p.name]) pts[p.name]={name:p.name,img:null,ipl_team:p.ipl_team||playerTeamMap[p.name]||'',role:p.role,total:0};
        pts[p.name].total += (p.final||0);
      });
    });
    var list = Object.values(pts).sort(function(a,b){return b.total-a.total;});
    var top = list[0], worst = list[list.length-1];
    var rows = [];
    if(top)   rows.push({...top, label:'🔥 Top', color:'var(--accent)'});
    if(worst && worst!==top) rows.push({...worst, label:'📉 Low', color:'var(--red)'});
    var avatar = function(name){ var sp=squad.find(function(s){return s.player&&s.player.name===name;}); return sp&&sp.player&&sp.player.image_url?sp.player.image_url:''; };
    $('#performer-list').innerHTML = !rows.length
      ? '<div style="color:var(--text3);font-size:13px;padding:8px;">No match data yet.</div>'
      : rows.map(function(r){
          return '<div class="performer-row">'+
            '<img class="performer-avatar" src="'+UI.esc(avatar(r.name)||'https://ui-avatars.com/api/?name='+encodeURIComponent(r.name)+'&background=1a2035&color=c8f135&size=80')+'" alt="" onerror="this.src=\'https://ui-avatars.com/api/?name=P&background=1a2035&color=c8f135\'" >'+
            '<div class="performer-info"><div class="performer-name">'+UI.esc(r.name)+'</div><div class="performer-sub">'+UI.esc(r.role||'')+' · '+(UI.tShort(r.ipl_team)||r.ipl_team||'')+'</div></div>'+
            '<div style="text-align:right;"><div class="performer-pts" style="color:'+r.color+'">'+UI.fmtPts(r.total)+'</div><div style="font-size:10px;color:var(--text3);">'+r.label+'</div></div>'+
          '</div>';
        }).join('');
  } catch(e) { UI.toast('Could not load player spotlight','error'); }
}

async function loadRecent() {
  try {
    var logs = await API.fetchPointsBreakdown(_myTeamId);
    if(!logs.length){ $('#recent-results').innerHTML='<div style="text-align:center;color:var(--text3);padding:16px;font-size:14px;">No match results yet</div>'; return; }
    $('#recent-results').innerHTML='<div class="table-wrap"><table class="data-table"><thead><tr><th>Match</th><th>Squad</th><th>Pred</th><th>Total</th></tr></thead><tbody>'+
      logs.slice().reverse().slice(0,5).map(function(l){
        var matchTitle = l.match ? (l.match.match_title || UI.fmtMatch(l.match.team1, l.match.team2)) : '—';
        return '<tr class="clickable-row" onclick="showBreakdown(\''+l.id+'\')"><td style="font-weight:400;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+matchTitle+'</td><td class="font-mono">'+UI.fmtPts(l.squad_points)+'</td><td class="font-mono">'+UI.fmtPts(l.prediction_points)+'</td><td class="pts">'+UI.fmtPts(l.total_points)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  } catch(e) { UI.toast('Could not load recent results','error'); }
}

function showBreakdown(logId) {
  var log = _matchLogs.find(function(l){return l.id===logId;});
  if(!log||!log.breakdown||!log.breakdown.players){ UI.toast('No breakdown data','warn'); return; }
  var players = log.breakdown.players;
  var html='<div class="table-wrap"><table class="data-table" style="font-size:13px;"><thead><tr><th>Player</th><th>Role</th><th>Mult</th><th>Pts</th></tr></thead><tbody>';
  players.forEach(function(p){
    var rl=p.isCaptain?'(C)':p.isVC?'(VC)':p.isImpact?'(IP)':'';
    html+='<tr><td><div style="font-weight:'+(p.isCaptain||p.isVC||p.isImpact?'700':'400')+'">'+UI.esc(p.name)+'</div><div style="font-size:10px;color:var(--text3);">'+UI.esc(p.ipl_team||'—')+'</div></td>'+
      '<td style="font-size:11px;">'+UI.esc((p.role||'').substring(0,3).toUpperCase())+' <span style="color:var(--accent);">'+rl+'</span></td>'+
      '<td class="font-mono">'+(p.multiplier?p.multiplier+'x':'—')+'</td>'+
      '<td class="font-mono" style="font-weight:700;color:var(--accent);">'+UI.fmtPts(p.final)+'</td></tr>';
  });
  html+='</tbody></table></div><div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
    '<div style="font-size:12px;color:var(--text3);">Prediction: <span style="color:var(--text2);font-weight:600;">+'+UI.fmtPts(log.prediction_points)+'</span></div>'+
    '<div style="font-size:16px;font-weight:700;">Total: <span style="color:var(--accent);">'+UI.fmtPts(log.total_points)+'</span></div></div>';
  var mTitle = log.match ? (log.match.match_title || UI.fmtMatch(log.match.team1, log.match.team2)) : 'Match Breakdown';
  UI.showModal({title:mTitle, content:html});
}

async function loadMiniLB() {
  try {
    var lb = await API.fetchLeaderboard();
    if (lb.some(function(r){ return !r.matches_played && r.matches_played !== 0; })) {
      try {
        // Only count points_log entries for non-abandoned matches
        var allLogs = await sb.from('points_log').select('fantasy_team_id, match:matches(status)');
        var counts = {};
        (allLogs.data || []).forEach(function(l){ 
          if (l.match && (l.match.status === 'completed' || l.match.status === 'processed')) {
            counts[l.fantasy_team_id] = (counts[l.fantasy_team_id] || 0) + 1; 
          }
        });
        lb.forEach(function(r){ if (!r.matches_played && r.matches_played !== 0) r.matches_played = counts[r.fantasy_team_id] || 0; });
      } catch(e) {}
    }
    var medals={1:'🥇',2:'🥈',3:'🥉'};
    $('#mini-leaderboard').innerHTML='<div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>Team</th><th>Played</th><th>Points</th></tr></thead><tbody>'+
      lb.slice(0,5).map(function(r){
        var isMe=r.fantasy_team_id===_myTeamId;
        return '<tr'+(isMe?' class="highlight-me"':'')+'>'+
          '<td class="rank">'+(medals[r.rank]||r.rank)+' '+UI.rankBadge(r.rank, r.prev_rank)+'</td>'+
          '<td style="font-weight:600;">'+UI.championName(r.team?r.team.team_name:'—')+(isMe?' <span class="badge badge-accent" style="font-size:10px;">You</span>':'')+'</td>'+
          '<td style="color:var(--text2);">'+r.matches_played+'</td>'+
          '<td class="pts">'+UI.fmtPts(r.total_points)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  } catch(e) { UI.toast('Could not load leaderboard','error'); }
}

function $(sel){ var s=String(sel); if(s.charAt(0)==='#') return document.getElementById(s.substring(1)); return document.querySelector(s); }
