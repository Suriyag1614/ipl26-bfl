<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — BFL Fantasy IPL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-wrap">
  <main class="main" style="position:relative;z-index:1;">
    <div class="container">

      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div>
          <div style="font-size:13px;color:var(--text2);font-weight:500;margin-bottom:4px;" id="welcome-date">—</div>
          <div class="page-title" id="welcome-title">Loading…</div>
        </div>
        <div id="rank-chip" style="display:none;">
          <div style="background:var(--gold-dim);border:1px solid rgba(245,200,66,0.25);border-radius:12px;padding:12px 20px;text-align:center;">
            <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold);" id="rank-val">—</div>
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Current Rank</div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid" id="stat-grid">
        <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
        <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
      </div>

      <!-- Two-col grid -->
      <div id="main-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;">

        <div>
          <!-- Next match -->
          <div class="card" id="next-match-card">
            <div class="card-title">Next Match</div>
            <div class="skel skel-card" style="height:120px;"></div>
          </div>

          <!-- Impact usage -->
          <div class="card" style="margin-top:16px;">
            <div class="card-title">Impact Player Uses</div>
            <div class="impact-meter" id="impact-meter">
              <div>
                <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;" id="impact-left">—</div>
                <div style="font-size:12px;color:var(--text2);">remaining this season</div>
              </div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;max-width:180px;margin-left:auto;" id="impact-pips"></div>
            </div>
          </div>
        </div>

        <!-- Recent matches -->
        <div class="card" style="height:100%;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="card-title" style="margin:0;">Recent Matches</div>
            <a href="leaderboard.html" style="font-size:13px;color:var(--accent);">Full standings →</a>
          </div>
          <div id="history-wrap">
            <div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>
          </div>
        </div>

      </div>

      <!-- Mini leaderboard -->
      <div class="card" style="margin-top:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="card-title" style="margin:0;">Top 5 Teams</div>
          <a href="leaderboard.html" class="btn btn-ghost btn-sm">View All</a>
        </div>
        <div id="mini-lb-wrap">
          <div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _myTeam = null, _myTeamId = null;

async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;

  // Redirect admin to admin panel
  if (Auth.isAdmin(sess.user)) { window.location.href = 'admin.html'; return; }

  await initNavbar('dashboard');
  _myTeam = await Auth.fetchTeam(sess.user.id);
  if (!_myTeam) { UI.toast('Team not linked to your account. Contact admin.', 'error'); return; }
  _myTeamId = _myTeam.id;

  document.getElementById('welcome-date').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('welcome-title').textContent = 'Welcome, ' + _myTeam.team_name + ' 👋';

  await Promise.all([loadStats(), loadNextMatch(), loadImpactUsage(), loadHistory(), loadMiniLB()]);
  fixGrid();
}

async function loadStats() {
  try {
    var [lb, logs] = await Promise.all([
      API.fetchLeaderboard(),
      API.fetchPointsBreakdown(_myTeamId),
    ]);
    var myRow   = lb.find(function(r){ return r.fantasy_team_id === _myTeamId; });
    var rank    = myRow ? myRow.rank : null;
    var total   = myRow ? myRow.total_points : 0;
    var matches = myRow ? myRow.matches_played : 0;
    var avg     = matches ? (total / matches).toFixed(1) : '—';

    if (rank) {
      document.getElementById('rank-chip').style.display = '';
      document.getElementById('rank-val').textContent = UI.ordinal(rank);
    }

    var grid = document.getElementById('stat-grid');
    grid.innerHTML =
      '<div class="stat-chip" style="animation-delay:0s"><div class="stat-chip-val" id="chip-pts">0</div><div class="stat-chip-lbl">Total Points</div></div>' +
      '<div class="stat-chip gold" style="animation-delay:0.07s"><div class="stat-chip-val" style="color:var(--gold);">' + (rank ? UI.ordinal(rank) : '—') + '</div><div class="stat-chip-lbl">Rank</div></div>' +
      '<div class="stat-chip cyan" style="animation-delay:0.14s"><div class="stat-chip-val" style="color:var(--cyan);">' + matches + '</div><div class="stat-chip-lbl">Matches Played</div></div>' +
      '<div class="stat-chip" style="animation-delay:0.21s"><div class="stat-chip-val">' + avg + '</div><div class="stat-chip-lbl">Avg / Match</div></div>';

    UI.countUp(document.getElementById('chip-pts'), total, 1200);
  } catch(e) { console.warn('stats:', e.message); }
}

async function loadNextMatch() {
  var card = document.getElementById('next-match-card');
  try {
    var ms = await API.fetchMatches({ upcoming: true, limit: 1 });
    var m  = ms[0];
    if (!m) {
      card.innerHTML = '<div class="card-title">Next Match</div><div class="empty-state" style="padding:24px;"><div class="empty-state-text">No upcoming matches</div></div>';
      return;
    }
    var pred = await API.fetchPrediction(m.id, _myTeamId);
    card.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">' +
        '<div class="card-title" style="margin:0;">Next Match</div>' +
        '<span class="match-status ' + (pred ? 'status-locked' : 'status-open') + '">' + (pred ? 'Predicted' : 'Open') + '</span>' +
      '</div>' +
      '<div class="match-teams" style="margin-bottom:12px;">' +
        '<div class="match-team">' + UI.esc(m.team1) + '</div>' +
        '<div class="match-vs">VS</div>' +
        '<div class="match-team">' + UI.esc(m.team2) + '</div>' +
      '</div>' +
      '<div class="match-meta" style="margin-bottom:14px;">' +
        '<span>📅 ' + UI.fmtDate(m.match_date) + '</span>' +
        (m.venue ? '<span>📍 ' + UI.esc(m.venue) + '</span>' : '') +
      '</div>' +
      '<a href="predictions.html" class="btn ' + (pred ? 'btn-ghost' : 'btn-accent') + ' btn-full btn-sm">' +
        (pred ? 'View Prediction' : 'Make Prediction →') + '</a>';
  } catch(e) {
    card.innerHTML = '<div class="card-title">Next Match</div><div style="color:var(--text3);font-size:13px;">Could not load.</div>';
  }
}

async function loadImpactUsage() {
  try {
    var count = await API.fetchImpactCount(_myTeamId);
    var left  = Math.max(0, 8 - count);
    document.getElementById('impact-left').textContent = left;
    document.getElementById('impact-left').style.color =
      left === 0 ? 'var(--red)' : left <= 2 ? '#f59e0b' : 'var(--accent)';
    var pips = '';
    for (var i = 0; i < 8; i++) {
      pips += '<div style="width:14px;height:14px;border-radius:50%;background:' +
        (i < count ? 'var(--accent)' : 'var(--bg3)') +
        ';border:1px solid ' + (i < count ? 'var(--accent)' : 'var(--border2)') + ';"></div>';
    }
    document.getElementById('impact-pips').innerHTML = pips;
  } catch(e) {}
}

async function loadHistory() {
  var wrap = document.getElementById('history-wrap');
  try {
    var logs = await API.fetchPointsBreakdown(_myTeamId);
    if (!logs.length) {
      wrap.innerHTML = '<div style="text-align:center;color:var(--text3);padding:24px;font-size:14px;">No match results yet</div>';
      return;
    }
    wrap.innerHTML = '<div class="table-wrap"><table class="data-table">' +
      '<thead><tr><th>Match</th><th>Squad</th><th>Pred</th><th>Total</th></tr></thead>' +
      '<tbody>' + logs.slice(0, 6).map(function(l) {
        return '<tr>' +
          '<td style="font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
            UI.esc(l.match ? (l.match.match_title || l.match.team1 + ' vs ' + l.match.team2) : '—') + '</td>' +
          '<td class="font-mono">' + l.squad_points + '</td>' +
          '<td class="font-mono">' + l.prediction_points + '</td>' +
          '<td class="pts">' + l.total_points + '</td>' +
          '</tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) { wrap.innerHTML = '<div style="color:var(--text3);font-size:13px;">Could not load history.</div>'; }
}

async function loadMiniLB() {
  var wrap = document.getElementById('mini-lb-wrap');
  try {
    var lb = await API.fetchLeaderboard();
    if (!lb.length) { wrap.innerHTML = '<div style="color:var(--text3);font-size:13px;">No data yet.</div>'; return; }
    var medals = {1:'🥇', 2:'🥈', 3:'🥉'};
    wrap.innerHTML = '<div class="table-wrap"><table class="data-table">' +
      '<thead><tr><th>#</th><th>Team</th><th>Played</th><th>Points</th></tr></thead>' +
      '<tbody>' + lb.slice(0, 5).map(function(r) {
        var isMe = r.fantasy_team_id === _myTeamId;
        return '<tr' + (isMe ? ' class="highlight-me"' : '') + '>' +
          '<td class="rank">' + (medals[r.rank] || r.rank) + '</td>' +
          '<td style="font-weight:600;">' + UI.esc(r.team ? r.team.team_name : '—') +
            (isMe ? ' <span class="badge badge-accent" style="font-size:10px;">You</span>' : '') + '</td>' +
          '<td style="color:var(--text2);">' + r.matches_played + '</td>' +
          '<td class="pts">' + r.total_points + '</td>' +
          '</tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) { wrap.innerHTML = '<div style="color:var(--text3);font-size:13px;">Could not load.</div>'; }
}

function fixGrid() {
  var g = document.getElementById('main-grid');
  if (g) g.style.gridTemplateColumns = window.innerWidth < 700 ? '1fr' : '1fr 1fr';
}
window.addEventListener('resize', fixGrid);

init();
</script>
</body>
</html>
