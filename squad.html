<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/bfl/bfl-logo.png">
  <meta name="theme-color" content="#f0b429">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 — BFL My Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .filter-tab{padding:6px 14px;background:transparent;border:none;border-radius:7px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
    .filter-tab.active{background:var(--accent);color:#000;}
    .player-pts-row{display:flex;align-items:center;justify-content:space-between;background:rgba(200,241,53,.05);border-radius:5px;padding:3px 7px;margin-top:7px;font-size:11px;}
    .badge-injured{display:inline-flex;align-items:center;gap:3px;background:rgba(255,77,109,.18);color:var(--red);border:1px solid rgba(255,77,109,.35);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:400;}
    .badge-replacement{display:inline-flex;align-items:center;gap:3px;background:rgba(56,217,245,.14);color:var(--cyan);border:1px solid rgba(56,217,245,.3);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:400;}
    .player-card.injured{border-color:rgba(255,77,109,.4);}
    .player-card.injured::before{background:var(--red);}
    .player-card.replaced{border-color:rgba(56,217,245,.4);}
    .player-card.replaced::before{background:var(--cyan);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal-box{background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius-xl);padding:26px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:scale-in .22s ease both;display:flex;flex-direction:column;gap:16px;}
    .modal-title{font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:20px;margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;}
    .confirm-box{background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:380px;text-align:center;}
    .confirm-icon{font-size:36px;margin-bottom:12px;}
    .confirm-msg{font-size:15px;color:var(--text2);margin-bottom:8px;line-height:1.6;}
    .confirm-consequence{font-size:12px;color:var(--text3);margin-bottom:22px;}
    .rp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .18s;margin-bottom:8px;}
    .rp-row:hover,.rp-row.selected{border-color:var(--accent);background:var(--accent-dim);}
    .injury-banner{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="modal-overlay" id="rep-modal" style="display:none;" onclick="if(event.target===this)closeRepModal()">
  <div class="modal-box">
    <div class="modal-title">Request Temporary Replacement</div>
    <div class="modal-sub" id="rep-modal-sub">Select a same-role replacement.</div>
    <div class="form-group" style="max-height:220px;overflow-y:auto;" id="rep-player-list"></div>
    <div class="form-group">
      <label class="form-label">Start From Match</label>
      <select class="form-select" id="rep-start-match">
        <option value="">Select match</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">End After Match <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
      <select class="form-select" id="rep-end-match">
        <option value="">No end (permanent)</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-accent" style="flex:1;" onclick="submitReplacement()">Submit Request</button>
      <button class="btn btn-ghost" style="flex:1;" onclick="closeRepModal()">Cancel</button>
    </div>
  </div>
</div>


<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
  <main class="main">
    <div class="container">
      <div class="page-header flex-between">
        <div><div class="page-title">My Squad</div><div class="page-sub">12 players &middot; IPL 2026 Season</div></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;">
            <button class="filter-tab active" onclick="setFilter('')">All</button>
            <button class="filter-tab" onclick="setFilter('Batter')">BAT</button>
            <button class="filter-tab" onclick="setFilter('Bowler')">BOWL</button>
            <button class="filter-tab" onclick="setFilter('All-Rounder')">AR</button>
            <button class="filter-tab" onclick="setFilter('Wicket-Keeper')">WK</button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="exportSquadPDF()">PDF</button>
        </div>
      </div>
      <div class="card mb-20" id="squad-summary"><div class="skel skel-text" style="width:70%;"></div></div>
      <div class="player-grid" id="player-grid">
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
      </div>
      <div class="card mt-24" id="unavailable-card" style="display:none;">
        <div class="card-title">Unavailable Players</div>
        <div id="unavailable-list"></div>
      </div>
      <div class="card mt-24" id="replacements-card" style="display:none;">
        <div class="card-title">Active Replacements</div>
        <div id="replacements-list"></div>
      </div>
      <div class="card mt-24" id="pending-replacements-card" style="display:none;">
        <div class="card-title">Replacement Requests</div>
        <div id="pending-replacements-list"></div>
      </div>
      <div class="card mt-24">
        <div class="card-title">Role Breakdown</div>
        <div style="display:flex;gap:18px;flex-wrap:wrap;" id="role-bars"></div>
      </div>
    </div>
  </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/squad.js"></script>
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="footer-content">
    <div class="footer-logos">
      <img src="images/bfl/bfl-logo.png" alt="BFL Logo" class="footer-logo footer-logo-bfl">
      <img src="images/ipl/ipl-logo.png" alt="IPL Logo" class="footer-logo footer-logo-t20">
    </div>
    <p class="footer-copy">Copyright 2026 BFL. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
