<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Squad — BFL Fantasy IPL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .filter-tab {
      padding: 6px 14px; background: transparent; border: none; border-radius: 7px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text2); cursor: pointer; transition: all 0.2s;
    }
    .filter-tab.active { background: var(--accent); color: #000; }
    .player-pts-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(200,241,53,0.05); border-radius: 5px;
      padding: 3px 7px; margin-top: 7px; font-size: 11px;
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-wrap">
  <main class="main" style="position:relative;z-index:1;">
    <div class="container">

      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;">
        <div>
          <div class="page-title">My Squad</div>
          <div class="page-sub">12 players · IPL 2026 Season</div>
        </div>
        <div style="display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;" id="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('')">All</button>
          <button class="filter-tab" onclick="setFilter('Batter')">BAT</button>
          <button class="filter-tab" onclick="setFilter('Bowler')">BOWL</button>
          <button class="filter-tab" onclick="setFilter('All-Rounder')">AR</button>
          <button class="filter-tab" onclick="setFilter('Wicket-Keeper')">WK</button>
        </div>
      </div>

      <!-- Squad summary -->
      <div class="card" style="margin-bottom:20px;" id="squad-summary">
        <div class="skel skel-text" style="width:70%;"></div>
      </div>

      <!-- Player grid -->
      <div class="player-grid" id="player-grid">
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
        <div class="skel skel-card" style="height:190px;border-radius:16px;"></div>
      </div>

      <!-- Role breakdown -->
      <div class="card" style="margin-top:24px;">
        <div class="card-title">Role Breakdown</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap;" id="role-bars"></div>
      </div>

    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _squad      = [];
var _playerPts  = {};
var _filter     = '';
var _myTeamId   = null;

async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  if (Auth.isAdmin(sess.user)) { window.location.href = 'admin.html'; return; }
  await initNavbar('squad');
  var team = await Auth.fetchTeam(sess.user.id);
  if (!team) return;
  _myTeamId = team.id;
  await loadSquad();
  await loadPointsByPlayer();
}

async function loadSquad() {
  try {
    _squad = await API.fetchSquad(_myTeamId);
    renderSquad();
    renderSummary();
    renderRoleBreakdown();
    UI.stagger(document.getElementById('player-grid'), 55);
  } catch(e) { UI.toast('Could not load squad: ' + e.message, 'error'); }
}

async function loadPointsByPlayer() {
  try {
    var logs = await API.fetchPointsBreakdown(_myTeamId);
    logs.forEach(function(l) {
      if (!l.breakdown || !l.breakdown.players) return;
      l.breakdown.players.forEach(function(p) {
        if (!_playerPts[p.name]) _playerPts[p.name] = 0;
        _playerPts[p.name] += p.final || 0;
      });
    });
    renderSquad();
  } catch(e) {}
}

function setFilter(role) {
  _filter = role;
  var roles = ['', 'Batter', 'Bowler', 'All-Rounder', 'Wicket-Keeper'];
  document.querySelectorAll('.filter-tab').forEach(function(b, i) {
    b.classList.toggle('active', roles[i] === role);
  });
  renderSquad();
}

function renderSquad() {
  var list = _filter ? _squad.filter(function(sp){ return sp.player && sp.player.role === _filter; }) : _squad;
  var grid = document.getElementById('player-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏏</div><div class="empty-state-text">No players in this category</div></div>';
    return;
  }
  var colorsMap = { CSK:'#fdb913',MI:'#004ba0',RCB:'#da1818',KKR:'#6a1bac',SRH:'#f26522',DC:'#004c93',PBKS:'#ed1b24',RR:'#ea1a85',GT:'#1c2c5b',LSG:'#ff002b',SURA:'#1a3a8a' };
  grid.innerHTML = list.map(function(sp, i) {
    var p      = sp.player || {};
    var isCap  = sp.is_captain;
    var isVC   = sp.is_vc;
    var color  = colorsMap[(p.ipl_team || '').toUpperCase()] || '#f0b429';
    var pts    = Math.round(_playerPts[p.name] || 0);
    var imgSrc = p.image_url ||
      'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name || 'P') + '&background=1a2035&color=c8f135&size=128';
    return '<div class="player-card ' + (isCap ? 'captain' : isVC ? 'vice-cap' : '') + '" style="--ipl-color:' + color + ';animation-delay:' + (i * 0.05) + 's">' +
      (isCap ? '<div class="captain-badge">👑 Captain</div>' : isVC ? '<div class="captain-badge vc-badge">⭐ Vice Captain</div>' : '') +
      '<img class="player-avatar" src="' + imgSrc + '" alt="' + UI.esc(p.name) + '" ' +
        'onerror="this.src=\'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name || 'P') + '&background=1a2035&color=c8f135&size=128\'">' +
      '<div class="player-name">' + UI.esc(p.name) + '</div>' +
      '<div class="player-ipl">' + UI.esc(p.ipl_team || '—') + '</div>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;">' +
        UI.roleBadge(p.role) +
        (p.is_overseas ? ' <span class="tag-os">OS</span>' : '') +
        (isCap ? ' <span class="badge badge-gold" style="font-size:10px;">2×</span>' : '') +
        (isVC  ? ' <span class="badge badge-cyan"  style="font-size:10px;">1.5×</span>' : '') +
      '</div>' +
      (pts > 0 ? '<div class="player-pts-row"><span style="color:var(--text2);">Season pts</span><span style="font-family:\'DM Mono\',monospace;font-weight:700;color:var(--accent);">' + pts + '</span></div>' : '') +
      '</div>';
  }).join('');
}

function renderSummary() {
  var cap = _squad.find(function(s){ return s.is_captain; });
  var vc  = _squad.find(function(s){ return s.is_vc; });
  var os  = _squad.filter(function(s){ return s.player && s.player.is_overseas; }).length;
  document.getElementById('squad-summary').innerHTML =
    '<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">' +
      '<div><span style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;">Players</span>' +
        '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:22px;">' + _squad.length + '<span style="font-size:14px;color:var(--text2);">/12</span></div></div>' +
      '<div style="width:1px;height:36px;background:var(--border);"></div>' +
      '<div><span style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;">Captain</span>' +
        '<div style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:16px;">👑 ' + (cap ? UI.esc(cap.player && cap.player.name || '—') : '—') + '</div></div>' +
      '<div><span style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;">Vice Captain</span>' +
        '<div style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:16px;">⭐ ' + (vc ? UI.esc(vc.player && vc.player.name || '—') : '—') + '</div></div>' +
      '<div><span style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;">Overseas</span>' +
        '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:22px;">' + os + '<span style="font-size:14px;color:var(--text2);">/4</span></div></div>' +
    '</div>';
}

function renderRoleBreakdown() {
  var counts = { Batter:0, Bowler:0, 'All-Rounder':0, 'Wicket-Keeper':0 };
  _squad.forEach(function(sp){ if (sp.player && sp.player.role) counts[sp.player.role] = (counts[sp.player.role]||0) + 1; });
  var labels = { Batter:'BAT', Bowler:'BOWL', 'All-Rounder':'AR', 'Wicket-Keeper':'WK' };
  var colors = { Batter:'#f87171', Bowler:'#60a5fa', 'All-Rounder':'#34d399', 'Wicket-Keeper':'#fbbf24' };
  document.getElementById('role-bars').innerHTML = Object.entries(counts).map(function(entry) {
    var role = entry[0], n = entry[1];
    return '<div style="flex:1;min-width:110px;">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">' +
        '<span style="color:var(--text2);">' + labels[role] + '</span><span style="font-weight:700;">' + n + '</span>' +
      '</div>' +
      '<div style="height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;">' +
        '<div style="height:100%;background:' + colors[role] + ';border-radius:4px;width:' + ((n/4)*100) + '%;transition:width 1s ease;"></div>' +
      '</div>' +
      '</div>';
  }).join('');
}

init();
</script>
</body>
</html>
