<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8f135">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Squad — BFL Fantasy IPL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .filter-tab{padding:6px 14px;background:transparent;border:none;border-radius:7px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s;}
    .filter-tab.active{background:var(--accent);color:#000;}
    .player-pts-row{display:flex;align-items:center;justify-content:space-between;background:rgba(200,241,53,.05);border-radius:5px;padding:3px 7px;margin-top:7px;font-size:11px;}
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>
<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
  <main class="main">
    <div class="container">
      <div class="page-header flex-between">
        <div>
          <div class="page-title">My Squad</div>
          <div class="page-sub">12 players &middot; IPL 2026 Season</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;">
            <button class="filter-tab active" onclick="setFilter('')">All</button>
            <button class="filter-tab" onclick="setFilter('Batter')">BAT</button>
            <button class="filter-tab" onclick="setFilter('Bowler')">BOWL</button>
            <button class="filter-tab" onclick="setFilter('All-Rounder')">AR</button>
            <button class="filter-tab" onclick="setFilter('Wicket-Keeper')">WK</button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="exportSquadPDF()">PDF</button>
        </div>
      </div>
      <div class="card mb-20" id="squad-summary"><div class="skel skel-text" style="width:70%;"></div></div>
      <div class="player-grid" id="player-grid">
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
        <div class="skel skel-card"></div><div class="skel skel-card"></div>
      </div>
      <div class="card mt-24">
        <div class="card-title">Role Breakdown</div>
        <div style="display:flex;gap:18px;flex-wrap:wrap;" id="role-bars"></div>
      </div>
    </div>
  </main>
</div>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/squad.js"></script>
</body>
</html>
