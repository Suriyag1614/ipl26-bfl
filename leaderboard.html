<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — BFL Fantasy IPL 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-wrap">
  <main class="main" style="position:relative;z-index:1;">
    <div class="container">

      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;">
        <div>
          <div class="page-title">Leaderboard</div>
          <div class="page-sub">IPL 2026 Season Standings</div>
        </div>
        <div id="my-rank-chip" style="display:none;">
          <div class="stat-chip gold" style="padding:12px 20px;text-align:center;min-width:0;">
            <div class="stat-chip-val" style="font-size:22px;color:var(--gold);" id="my-rank-val">—</div>
            <div class="stat-chip-lbl">Your Rank</div>
          </div>
        </div>
      </div>

      <!-- Podium -->
      <div id="podium-wrap" style="margin-bottom:32px;">
        <div class="skel skel-card" style="height:200px;border-radius:16px;"></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('overall')">Overall Standings</button>
        <button class="tab-btn" onclick="switchTab('breakdown')">My Match Breakdown</button>
      </div>

      <div class="tab-panel active" id="tab-overall">
        <div class="card" style="padding:0;overflow:hidden;">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th style="width:48px;">#</th><th>Team</th><th style="width:90px;">Played</th><th style="width:100px;">Avg</th><th style="width:110px;">Total Pts</th></tr></thead>
              <tbody id="lb-tbody">
                <tr><td colspan="5"><div class="skel skel-row" style="margin:8px;"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="tab-breakdown">
        <div class="card" style="padding:0;overflow:hidden;">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Match</th><th>Date</th><th>Squad Pts</th><th>Pred Pts</th><th>Total</th></tr></thead>
              <tbody id="breakdown-tbody">
                <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:32px;">Click this tab to load your breakdown</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _myTeamId = null, _lb = [], _breakdownLoaded = false;

async function init() {
  var sess = await Auth.requireAuth();
  if (!sess) return;
  if (Auth.isAdmin(sess.user)) { window.location.href = 'admin.html'; return; }
  await initNavbar('leaderboard');
  var team = await Auth.fetchTeam(sess.user.id);
  if (!team) return;
  _myTeamId = team.id;
  await loadLeaderboard();
}

async function loadLeaderboard() {
  try {
    _lb = await API.fetchLeaderboard();
    renderPodium();
    renderTable();
    var myRow = _lb.find(function(r){ return r.fantasy_team_id === _myTeamId; });
    if (myRow) {
      document.getElementById('my-rank-chip').style.display = '';
      document.getElementById('my-rank-val').textContent = UI.ordinal(myRow.rank);
    }
  } catch(e) { UI.toast('Could not load leaderboard', 'error'); }
}

function renderPodium() {
  var top3 = _lb.slice(0, 3);
  var wrap = document.getElementById('podium-wrap');
  if (!top3.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><div class="empty-state-text">No results yet — check back after the first match</div></div>';
    return;
  }
  var order  = [top3[1], top3[0], top3[2]].filter(Boolean);
  var emojis = ['🥈','🥇','🥉'];
  var slots  = [2, 1, 3];
  wrap.innerHTML = '<div class="podium">' +
    order.map(function(r, i) {
      if (!r) return '';
      return '<div class="podium-slot podium-' + slots[i] + '" style="animation:fade-up 0.5s ease ' + (0.1*i) + 's both;">' +
        '<div class="podium-crown">' + emojis[i] + '</div>' +
        '<div class="podium-pts">' + r.total_points + '</div>' +
        '<div class="podium-name">' + UI.esc(r.team ? r.team.team_name : '—') + '</div>' +
        '<div class="podium-block">' + slots[i] + '</div>' +
      '</div>';
    }).join('') +
    '</div>';
}

function renderTable() {
  var tbody  = document.getElementById('lb-tbody');
  var medals = {1:'🥇',2:'🥈',3:'🥉'};
  if (!_lb.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No results yet</td></tr>'; return;
  }
  tbody.innerHTML = _lb.map(function(r, i) {
    var isMe = r.fantasy_team_id === _myTeamId;
    var avg  = r.matches_played ? (r.total_points / r.matches_played).toFixed(1) : '—';
    return '<tr class="' + (isMe ? 'highlight-me' : '') + '" style="animation:fade-up 0.35s ease ' + (0.04*i) + 's both;">' +
      '<td class="rank">' + (medals[r.rank] || r.rank) + '</td>' +
      '<td style="font-family:\'Syne\',sans-serif;font-weight:700;">' +
        UI.esc(r.team ? r.team.team_name : '—') +
        (r.team && r.team.owner_name ? '<span style="font-size:12px;color:var(--text2);font-family:\'DM Sans\',sans-serif;"> · ' + UI.esc(r.team.owner_name) + '</span>' : '') +
        (isMe ? ' <span class="badge badge-accent" style="font-size:10px;">You</span>' : '') +
      '</td>' +
      '<td style="color:var(--text2);">' + r.matches_played + '</td>' +
      '<td style="font-family:\'DM Mono\',monospace;">' + avg + '</td>' +
      '<td class="pts">' + r.total_points + '</td>' +
      '</tr>';
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i){
    b.classList.toggle('active', ['overall','breakdown'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'breakdown' && !_breakdownLoaded) { _breakdownLoaded = true; loadBreakdown(); }
}

async function loadBreakdown() {
  var tbody = document.getElementById('breakdown-tbody');
  try {
    var logs = await API.fetchPointsBreakdown(_myTeamId);
    if (!logs.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:32px;">No match results yet</td></tr>'; return;
    }
    var total = logs.reduce(function(s, l){ return s + Number(l.total_points || 0); }, 0);
    tbody.innerHTML = logs.map(function(l) {
      return '<tr>' +
        '<td style="font-weight:600;">' + UI.esc(l.match ? (l.match.match_title || l.match.team1 + ' vs ' + l.match.team2) : '—') + '</td>' +
        '<td style="color:var(--text2);font-size:13px;">' + UI.shortDate(l.match && l.match.match_date) + '</td>' +
        '<td class="font-mono">' + l.squad_points + '</td>' +
        '<td class="font-mono">' + l.prediction_points + '</td>' +
        '<td class="pts">' + l.total_points + '</td>' +
        '</tr>';
    }).join('') +
    '<tr style="border-top:2px solid var(--border);">' +
      '<td colspan="4" style="font-family:\'Syne\',sans-serif;font-weight:700;text-align:right;">Season Total</td>' +
      '<td class="pts">' + total + '</td>' +
    '</tr>';
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--red);padding:24px;">Failed to load breakdown</td></tr>';
  }
}

init();
</script>
</body>
</html>
