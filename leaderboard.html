<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8f135">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - BFL Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="toast-container"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<nav class="navbar" id="navbar"></nav>
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></div>

<div class="page-content-wrap" id="page-content-wrap">
<div class="page-wrap">
<main class="main" style="position:relative;z-index:1;">
<div class="container">

  <div class="page-header flex-between">
    <div>
      <div class="page-title">Leaderboard</div>
      <div class="page-sub">Season standings &amp; per-match rankings</div>
    </div>
    <a href="match-center.html" class="btn btn-ghost btn-sm">Match Center →</a>
  </div>

  <!-- My rank chip -->
  <div id="my-rank-chip" style="display:none;margin-bottom:24px;">
    <div class="stat-chip gold" style="display:inline-flex;gap:20px;align-items:center;padding:16px 24px;">
      <div><div class="stat-chip-val" id="my-rank-val" style="font-size:28px;">—</div><div class="stat-chip-lbl">Your Rank</div></div>
      <div><div class="stat-chip-val" id="my-pts-val" style="font-size:28px;color:var(--text);">—</div><div class="stat-chip-lbl">Season Pts</div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overall')">Season Standings</button>
    <button class="tab-btn"        onclick="switchTab('matchwise')">Match-wise</button>
    <button class="tab-btn"        onclick="switchTab('breakdown')">My Breakdown</button>
  </div>

  <!-- ════ OVERALL ════ -->
  <div class="tab-panel active" id="tab-overall">
    <div id="podium-wrap" style="margin-bottom:28px;"><div class="skel skel-card" style="height:200px;border-radius:16px;"></div></div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th style="width:48px;">#</th><th>Team</th><th>Played</th><th>Avg</th><th>Total Pts</th></tr></thead>
          <tbody id="lb-tbody"><tr><td colspan="5"><div class="skel skel-row" style="margin:8px;"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ════ MATCH-WISE ════ -->
  <div class="tab-panel" id="tab-matchwise">
    <div class="form-group" style="max-width:320px;">
      <label class="form-label">Select Match</label>
      <select class="form-select" id="matchwise-select" onchange="loadMatchLB(this.value)">
        <option value="">— Select match —</option>
      </select>
    </div>
    <div id="matchwise-lb" class="card" style="padding:0;overflow:hidden;display:none;">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th style="width:48px;">#</th><th>Team</th><th>Squad</th><th>Pred</th><th>Total</th></tr></thead>
          <tbody id="matchwise-tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="matchwise-empty" class="empty-state mt-24" style="display:none;">
      <div class="empty-state-icon">📊</div>
      <div class="empty-state-text">Select a match to see its leaderboard</div>
    </div>
    <div class="empty-state mt-24" id="matchwise-placeholder">
      <div class="empty-state-icon">📊</div>
      <div class="empty-state-text">Select a match above</div>
    </div>
  </div>

  <!-- ════ BREAKDOWN ════ -->
  <div class="tab-panel" id="tab-breakdown">
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Match</th><th>Date</th><th>Bat</th><th>Bowl</th><th>Fld</th><th>Pred</th><th>Total</th></tr></thead>
          <tbody id="breakdown-tbody"><tr><td colspan="7" class="empty-state">Click this tab to load</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
'use strict';
var _myTeamId=null, _lb=[], _breakdownLoaded=false;

async function init() {
  var sess=await Auth.requireAuth(); if(!sess) return;
  if(Auth.isAdmin(sess.user)){window.location.href='admin.html';return;}
  await initNavbar('leaderboard');
  var team=await Auth.fetchTeam(sess.user.id); if(!team) return;
  _myTeamId=team.id;
  await Promise.all([loadLeaderboard(),populateMatchSelect()]);
}

async function loadLeaderboard() {
  try {
    _lb=await API.fetchLeaderboard();
    renderPodium(); renderTable();
    var myRow=_lb.find(function(r){return r.fantasy_team_id===_myTeamId;});
    if(myRow){
      document.getElementById('my-rank-chip').style.display='';
      document.getElementById('my-rank-val').textContent=UI.ordinal(myRow.rank);
      UI.countUp(document.getElementById('my-pts-val'),myRow.total_points,900);
    }
  } catch(e){UI.toast('Could not load leaderboard','error');}
}

function renderPodium() {
  var top3=_lb.slice(0,3), wrap=document.getElementById('podium-wrap');
  if(!top3.length){wrap.innerHTML='<div class="empty-state"><div class="empty-state-icon">🏆</div><div class="empty-state-text">No results yet</div></div>';return;}
  var order=[top3[1],top3[0],top3[2]].filter(Boolean);
  var emojis=['🥈','🥇','🥉'], slots=[2,1,3];
  wrap.innerHTML='<div class="podium">'+
    order.map(function(r,i){
      return '<div class="podium-slot podium-'+slots[i]+'" style="animation:fade-up .4s ease '+(i*.1)+'s both;">' +
        '<div class="podium-crown">'+emojis[i]+'</div>' +
        '<div class="podium-pts">'+r.total_points+'</div>' +
        '<div class="podium-name">'+UI.esc(r.team?r.team.team_name:'—')+'</div>' +
        '<div class="podium-block">'+slots[i]+'</div>'+
      '</div>';
    }).join('')+
  '</div>';
}

function renderTable() {
  var tbody=document.getElementById('lb-tbody');
  var medals={1:'🥇',2:'🥈',3:'🥉'};
  if(!_lb.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">No results yet</td></tr>';return;}
  tbody.innerHTML=_lb.map(function(r,i){
    var isMe=r.fantasy_team_id===_myTeamId;
    var avg=r.matches_played?(r.total_points/r.matches_played).toFixed(1):'—';
    return '<tr class="'+(isMe?'highlight-me':'')+'" style="animation:row-in .28s ease '+(.04*i)+'s both;">' +
      '<td class="rank">'+(medals[r.rank]||r.rank)+'</td>' +
      '<td style="font-family:var(--f-ui);font-weight:400;">'+UI.esc(r.team?r.team.team_name:'—')+
        (r.team&&r.team.owner_name?'<span style="font-size:12px;color:var(--text2);font-weight:400;"> · '+UI.esc(r.team.owner_name)+'</span>':'')+
        (isMe?' <span class="badge badge-accent" style="font-size:10px;">You</span>':'')+
      '</td>'+
      '<td style="color:var(--text2);">'+r.matches_played+'</td>'+
      '<td class="font-mono">'+avg+'</td>'+
      '<td class="pts">'+r.total_points+'</td>'+
    '</tr>';
  }).join('');
}

async function populateMatchSelect() {
  var matches=await API.fetchMatches({limit:74});
  var sel=document.getElementById('matchwise-select');
  sel.innerHTML='<option value="">— Select match —</option>'+
    matches.filter(function(m){return m.is_locked;}).map(function(m){
      return '<option value="'+m.id+'">M'+(m.match_no||'')+'  · '+UI.esc(m.match_title||m.team1+' vs '+m.team2)+'</option>';
    }).join('');
}

async function loadMatchLB(matchId) {
  document.getElementById('matchwise-placeholder').style.display='none';
  document.getElementById('matchwise-empty').style.display='none';
  document.getElementById('matchwise-lb').style.display='none';
  if(!matchId) return;
  try {
    var lb=await API.fetchMatchLeaderboard(matchId);
    if(!lb.length){document.getElementById('matchwise-empty').style.display='';return;}
    document.getElementById('matchwise-lb').style.display='';
    var medals={1:'🥇',2:'🥈',3:'🥉'};
    document.getElementById('matchwise-tbody').innerHTML=lb.map(function(r){
      var isMe=r.fantasy_team_id===_myTeamId;
      return '<tr class="'+(r.match_rank===1?'highlight-me ':isMe?'highlight-me ':'')+(isMe?'':'')+'">'+
        '<td class="rank">'+(medals[r.match_rank]||r.match_rank)+'</td>'+
        '<td style="font-family:var(--f-ui);font-weight:400;">'+UI.esc(r.team?.team_name||'—')+(isMe?' <span class="badge badge-accent" style="font-size:10px;">You</span>':'')+'</td>'+
        '<td class="font-mono">'+r.squad_points+'</td>'+
        '<td class="font-mono">'+r.prediction_points+'</td>'+
        '<td class="pts">'+r.total_points+'</td>'+
      '</tr>';
    }).join('');
  } catch(e){UI.toast('Failed to load: '+e.message,'error');}
}

function switchTab(tab) {
  var order=['overall','matchwise','breakdown'];
  document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',order[i]===tab);});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='breakdown'&&!_breakdownLoaded){_breakdownLoaded=true;loadBreakdown();}
}

async function loadBreakdown() {
  var tbody=document.getElementById('breakdown-tbody');
  try {
    var logs=await API.fetchPointsBreakdown(_myTeamId);
    if(!logs.length){tbody.innerHTML='<tr><td colspan="7" class="empty-state">No match results yet</td></tr>';return;}
    var total=logs.reduce(function(s,l){return s+(l.total_points||0);},0);
    tbody.innerHTML=logs.slice().reverse().map(function(l){
      return '<tr>'+
        '<td style="font-weight:400;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+UI.esc(l.match?(l.match.match_title||l.match.team1+' vs '+l.match.team2):'—')+'</td>'+
        '<td style="font-size:12px;color:var(--text2);">'+UI.shortDate(l.match&&l.match.match_date)+'</td>'+
        '<td class="font-mono" style="color:#f87171;">'+(l.batting_pts||0)+'</td>'+
        '<td class="font-mono" style="color:#60a5fa;">'+(l.bowling_pts||0)+'</td>'+
        '<td class="font-mono" style="color:#34d399;">'+(l.fielding_pts||0)+'</td>'+
        '<td class="font-mono" style="color:var(--gold);">'+l.prediction_points+'</td>'+
        '<td class="pts">'+l.total_points+'</td>'+
      '</tr>';
    }).join('')+
    '<tr style="border-top:2px solid var(--border);"><td colspan="6" style="font-family:var(--f-ui);font-weight:400;text-align:right;color:var(--text2);">Season Total</td><td class="pts">'+total+'</td></tr>';
  } catch(e){tbody.innerHTML='<tr><td colspan="7" style="color:var(--red);padding:24px;">Failed to load</td></tr>';}
}

init();
</script>
</div>
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="footer-content">
    <div class="footer-logos">
      <img src="images\bfl\bfl-logo.png" alt="BFL Logo" class="footer-logo footer-logo-bfl">
      <img src="images\ipl\ipl-logo.png" alt="IPL Logo" class="footer-logo footer-logo-t20">
    </div>
    <p class="footer-copy">Copyright 2026 BFL. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
